{% extends "base.html" %}

{% block title %}合同明细单价修改{% endblock %}

{% block main_content %}
    <div class="container-fluid p-0">
        <h4 class="mb-4">合同明细单价修改</h4>

        <!-- 订单表格 -->
        <div class="card">
            <div class="card-body">
                <div class="row g-3 align-items-center">
                    <div class="input-group mb-3" style="width: 500px">
                        <span class="input-group-text" id="filePrefix">文件名</span>
                        <input type="text" class="form-control" placeholder="filePrefix">
                    </div>
                </div>
                <div class="row g-3 align-items-center">
                    <div class="input-group mb-3" style="width: 1200px">
                        <span class="input-group-text" id="onesLink">onesLink</span>
                        <input type="text" class="form-control" placeholder="onesLink">
                    </div>
                </div>
                <div class="row g-3 align-items-center">
                    <div class="input-group mb-3" style="width: 500px">
                        <span class="input-group-text" id="bpoLineId">合同行号</span>
                        <input type="text" class="form-control">
                    </div>
                </div>

                <!-- 动态生成的下拉框容器 -->
                <div id="selectContainer">
                    <!-- 每种下拉框单独一行 -->
                </div>

                <!-- 动态生成的单选框容器 -->
                <div id="radioContainer">
                    <!-- 每种单选框单独一行 -->
                </div>

                <!-- 动态生成的数值类型输入框容器 -->
                <div id="numberInputContainer">
                    <!-- 所有数值类型的新值在一行，所有原值在一行 -->
                </div>

                <!-- 动态生成的文本类型输入框容器 -->
                <div id="textInputContainer">
                    <!-- 所有文本类型的新值在一行，所有原值在一行 -->
                </div>

                <!-- 动态生成的日期类型输入框容器 -->
                <div id="dateInputContainer">
                    <!-- 所有日期类型的新值在一行，所有原值在一行 -->
                </div>

                <!-- 动态生成的补充框容器 -->
                <div id="supplementContainer">
                    <!-- 每个补充框单独一行，包含主输入框和子输入框 -->
                </div>

                <button onclick="logAllFormValues()" class="layui-btn">获取所有值</button>

            </div>
        </div>
    </div>

    <!-- 引入 Layui 样式 -->
    <link rel="stylesheet" href="/static/layui/css/layui.css">

    <!-- 引入 JS 库 -->
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/layui/layui.js"></script>

    <script>
        // 存储所有 Layui 日期选择器实例
        const laydateInstances = [];
        // 存储所有 Layui dropdown 实例
        const dropdownInstances = [];

        // 全局变量：配置项数组
        let gSelectItems = [];
        let gRadioItems = [];
        let gNumberInputItems = [];
        let gTextInputItems = [];
        let gDateInputItems = [];
        let gSupplementItems = [];

        /**
         * 获取所有输入框的值（全局方法）
         */
        window.getAllFormValues = function () {
            var result = {};
            var $ = layui.$;

                      // 1. 获取下拉框的值
            gSelectItems.forEach(function (item) {
                const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                // 使用 jQuery 直接获取 select 的选中值
                const newVal = $('#' + newId).val() || '';
                const originVal = $('#' + originId).val() || '';

                console.log("newId", newId);
                console.log("newVal", newVal);
                console.log("originVal", originVal);

                result[item.bindingKey] = {
                    newValue: newVal,
                    originValue: originVal,
                    inputType: 'select'
                };
            });


            // 2. 获取单选框的值
            gRadioItems.forEach(function (item) {
                const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                // 获取选中的单选框值
                const checkedRadio = $('input[name="' + newId + '"]:checked');
                const newVal = checkedRadio.length > 0 ? checkedRadio.val() : '';
                const originVal = $('#' + originId).val();

                result[item.bindingKey] = {
                    newValue: newVal,
                    originValue: originVal,
                    inputType: 'radio'
                };
            });

            // 3. 获取普通输入框的值（包括数值、文本、日期）
            gNumberInputItems.concat(gTextInputItems).concat(gDateInputItems).forEach(function (item) {
                const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                const newVal = $('#' + newId).val() || '';
                const originVal = $('#' + originId).val() || '';

                result[item.bindingKey] = {
                    newValue: newVal,
                    originValue: originVal,
                    inputType: item.type,
                    fieldType: item.inputType
                };
            });

            // 4. 获取补充框的值
            gSupplementItems.forEach(function (item) {
                const mainNewId = `newMain${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const mainOriginId = `originMain${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                const mainNewVal = $('#' + mainNewId).val() || '';
                const mainOriginVal = $('#' + mainOriginId).val() || '';

                // 存储主输入框的值
                result[item.bindingKey] = {
                    newValue: mainNewVal,
                    originValue: mainOriginVal,
                    inputType: 'supplement',
                    fieldType: 'supplement'
                };

                // 存储每个子输入框的值（使用独立的 bindingKey）
                item.subFields.forEach((subField, index) => {
                    const subNewId = `newSub${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}_${index}`;
                    const subOriginId = `originSub${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}_${index}`;

                    const subNewVal = $('#' + subNewId).val() || '';
                    const subOriginVal = $('#' + subOriginId).val() || '';

                    result[subField.bindingKey] = {
                        newValue: subNewVal,
                        originValue: subOriginVal,
                        inputType: 'supplement-sub',
                        fieldType: 'supplement-sub',
                        parentKey: item.bindingKey
                    };
                });
            });

            return result;
        };

        /**
         * 打印所有表单值到控制台（全局方法）
         */
        window.logAllFormValues = function () {
            if (!layui.$) {
                console.error('Layui 尚未完全加载，请稍后再试');
                return null;
            }

            const allValues = window.getAllFormValues();
            console.log('=== 所有输入框的值 ===');
            console.log(allValues);
            console.log('JSON 格式:');
            console.log(JSON.stringify(allValues, null, 2));
            return allValues;
        };


        window.onload = function () {
            // 临时的配置项数组（后续可以从后端接口获取）
            const inputItems = [
                {
                    label: "数量",
                    type: "number",
                    originDefaultValue: "100",
                    newDefaultValue: "",
                    bindingKey: "qty",
                    newValueValidType: "",
                    originValueValidType: "",
                    sortOrder: 1,
                    inputType: 'input'
                },
                {
                    label: "单价",
                    type: "number",
                    originDefaultValue: "50.00",
                    newDefaultValue: "",
                    bindingKey: "price",
                    newValueValidType: "",
                    originValueValidType: "",
                    sortOrder: 2,
                    inputType: 'input'
                },
                {
                    label: "税率",
                    type: "number",
                    originDefaultValue: "0.13",
                    newDefaultValue: "",
                    bindingKey: "taxRate",
                    newValueValidType: "",
                    originValueValidType: "",
                    sortOrder: 3,
                    inputType: 'input'
                },
                {
                    label: "状态",
                    type: "string",
                    originDefaultValue: "active",
                    newDefaultValue: "active",
                    bindingKey: "status",
                    newValueValidType: "",
                    originValueValidType: "",
                    sortOrder: 1,
                    inputType: 'select',
                    options: [
                        {value: "active", label: "启用"},
                        {value: "inactive", label: "禁用"},
                        {value: "pending", label: "待审核"}
                    ]
                },
                {
                    label: "类型",
                    type: "boolean",
                    originDefaultValue: "true",
                    newDefaultValue: "",
                    bindingKey: "type",
                    newValueValidType: "",
                    originValueValidType: "",
                    sortOrder: 1,
                    inputType: 'radio',
                    options: [
                        {value: "true", label: "是"},
                        {value: "false", label: "否"}
                    ]
                },
                {
                    label: "姓名",
                    type: "text",
                    originDefaultValue: "张三",
                    newDefaultValue: "",
                    bindingKey: "name",
                    newValueValidType: "",
                    originValueValidType: "",
                    sortOrder: 4,
                    inputType: 'input'
                },
                {
                    label: "日期",
                    type: "date",
                    originDefaultValue: "20240101",
                    newDefaultValue: "",
                    bindingKey: "date",
                    newValueValidType: "",
                    originValueValidType: "",
                    sortOrder: 5,
                    inputType: 'input'
                },
                {
                    label: "地址信息",
                    type: "supplement",
                    originDefaultValue: "北京市朝阳区",
                    newDefaultValue: "",
                    bindingKey: "address",
                    newValueValidType: "",
                    originValueValidType: "",
                    sortOrder: 6,
                    inputType: 'supplement',
                    subFields: [
                        {label: "区", defaultValue: "朝阳区", width: 100, bindingKey: "address_district"},
                        {label: "街道", defaultValue: "建国路", width: 150, bindingKey: "address_street"}
                    ]
                },
                {
                    label: "联系方式",
                    type: "supplement",
                    originDefaultValue: "13800138000",
                    newDefaultValue: "",
                    bindingKey: "contact",
                    newValueValidType: "",
                    originValueValidType: "",
                    sortOrder: 7,
                    inputType: 'supplement',
                    subFields: [
                        {label: "区号", defaultValue: "010", width: 80, bindingKey: "contact_area_code"},
                        {label: "分机", defaultValue: "1234", width: 100, bindingKey: "contact_extension"}
                    ]
                }
            ];

            /**
             * 对配置项进行排序
             */
            function sortInputItems(items) {
                return items.sort((a, b) => a.sortOrder - b.sortOrder);
            }

            /**
             * 生成下拉框 HTML（使用 Layui select）
             */
            function generateSelectHtml(item) {
                const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                // 生成 option 选项
                const newOptionsHtml = item.options.map(opt => {
                    const selected = opt.value === item.newDefaultValue ? 'selected' : '';
                    return `<option value="${opt.value}" ${selected}>${opt.label}</option>`;
                }).join('');

                const originOptionsHtml = item.options.map(opt => {
                    const selected = opt.value === item.originDefaultValue ? 'selected' : '';
                    return `<option value="${opt.value}" ${selected}>${opt.label}</option>`;
                }).join('');

                return `
                    <div class="row g-3 align-items-center mb-3">
                        <div class="input-group">
                            <span class="input-group-text" style="min-width: 80px;">新${item.label}</span>
                            <div class="layui-input-inline layui-form layui-row" style="margin: 0;">
                                <select id="${newId}"
                                        data-binding-key="${item.bindingKey}"
                                        lay-search=""
                                        style="min-width: 200px;">
                                    <option value="">请选择或输入...</option>
                                    ${newOptionsHtml}
                                </select>
                            </div>
                            <div style="width: 30px"></div>
                            <span class="input-group-text" style="min-width: 80px;">原${item.label}</span>
                            <div class="layui-input-inline layui-form layui-row" style="margin: 0;">
                                <select id="${originId}"
                                        data-binding-key="${item.bindingKey}"
                                        lay-search
                                        style="min-width: 200px;">
                                    <option value="">请选择或输入...</option>
                                    ${originOptionsHtml}
                                </select>
                            </div>
                        </div>
                    </div>
                `;
            }


            /**
             * 生成单选框 HTML（只显示一个，另一个取反）
             */
            function generateRadioHtml(item) {
                const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                // 只生成新值的单选框
                let newOptionsHtml = item.options.map(opt => {
                    const checked = opt.value === item.newDefaultValue ? 'checked' : '';
                    return `
                        <div class="layui-form-radio" style="margin-left: 5px;">
                            <input type="radio"
                                   name="${newId}"
                                   id="${newId}_${opt.value}"
                                   value="${opt.value}"
                                   data-binding-key="${item.bindingKey}"
                                   data-is-boolean="true"
                                   ${checked} lay-ignore>
                            <label for="${newId}_${opt.value}" style="margin-left: 2px;">${opt.label}</label>
                        </div>
                    `;
                }).join('');

                // 原值直接计算得出（取反）
                const originValue = item.originDefaultValue === 'true' ? 'true' : 'false';
                const originLabel = item.originDefaultValue === 'true' ? '是' : '否';

                return `
                    <div class="row g-3 align-items-center mb-3">
                        <div class="input-group">
                            <span class="input-group-text">新${item.label}</span>
                            ${newOptionsHtml}
                            <div style="width: 30px"></div>
                            <input type="hidden" id="${originId}" value="${originValue}" data-binding-key="${item.bindingKey}">
                        </div>
                    </div>
                `;
            }

            /**
             * 生成输入框 HTML（所有新值在一行，所有原值在一行）
             */
            function generateInputHtml(items) {
                if (items.length === 0) return '';

                // 生成新值行
                let newHtml = '<div class="row g-3 align-items-center mb-3"><div class="input-group">';
                items.forEach((item, index) => {
                    const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                    newHtml += `
                        <span class="input-group-text">新${item.label}</span>
                        <input type="${item.type === 'date' ? 'text' : item.type}"
                               id="${newId}"
                               class="form-control"
                               value="${item.newDefaultValue}"
                               data-binding-key="${item.bindingKey}"
                               data-field-type="${item.type}">
                    `;
                    if (index < items.length - 1) {
                        newHtml += '<div style="width: 15px"></div>';
                    }
                });
                newHtml += '</div></div>';

                // 生成原值行
                let originHtml = '<div class="row g-3 align-items-center mb-3"><div class="input-group">';
                items.forEach((item, index) => {
                    const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                    originHtml += `
                        <span class="input-group-text">原${item.label}</span>
                        <input type="${item.type === 'date' ? 'text' : item.type}"
                               id="${originId}"
                               class="form-control"
                               value="${item.originDefaultValue}"
                               data-binding-key="${item.bindingKey}"
                               data-field-type="${item.type}">
                    `;
                    if (index < items.length - 1) {
                        originHtml += '<div style="width: 15px"></div>';
                    }
                });
                originHtml += '</div></div>';

                return newHtml + originHtml;
            }

            /**
             * 生成补充框 HTML（主输入框 + 子输入框为一组）
             */
            function generateSupplementHtml(item) {
                const mainNewId = `newMain${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const mainOriginId = `originMain${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                // 生成新值行的主输入框和子输入框
                let newHtml = '<div class="row g-3 align-items-center mb-3"><div class="input-group">';

                // 主输入框（新值）
                newHtml += `
                    <span class="input-group-text" style=" background: coral">新${item.label}</span>
                    <input type="text"
                           id="${mainNewId}"
                           class="form-control"
                           value="${item.newDefaultValue}"
                           data-binding-key="${item.bindingKey}"
                           data-field-type="supplement-main"
                           placeholder="请输入${item.label}"
                           style="max-width: 200px;border-color: red;">
                `;

                // 子输入框（新值）
                item.subFields.forEach((subField, index) => {
                    const subNewId = `newSub${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}_${index}`;
                    newHtml += `
                        <div style="width: 15px"></div>
                        <span class="input-group-text" style="max-width: ${subField.width || 80}px;">新${subField.label}</span>
                        <input type="text"
                               id="${subNewId}"
                               class="form-control"
                               value="${subField.defaultValue || ''}"
                               data-binding-key="${subField.bindingKey}"
                               data-sub-index="${index}"
                               data-field-type="supplement-sub"
                               placeholder="请输入${subField.label}"
                               style="min-width: ${subField.width || 120};">
                    `;
                });

                newHtml += '</div></div>';

                // 生成原值行的主输入框和子输入框
                let originHtml = '<div class="row g-3 align-items-center mb-3"><div class="input-group">';

                // 主输入框（原值）
                originHtml += `
                    <span class="input-group-text" style="background: coral;">原${item.label}</span>
                    <input type="text"
                           id="${mainOriginId}"
                           class="form-control"
                           value="${item.originDefaultValue}"
                           data-binding-key="${item.bindingKey}"
                           data-field-type="supplement-main"
                           placeholder="原${item.label}"
                           style="max-width: 200px;border-color: red;">
                `;

                // 子输入框（原值）
                item.subFields.forEach((subField, index) => {
                    const subOriginId = `originSub${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}_${index}`;
                    originHtml += `
                        <div style="width: 15px"></div>
                        <span class="input-group-text" style="max-width: ${subField.width || 80}px;">原${subField.label}</span>
                        <input type="text"
                               id="${subOriginId}"
                               class="form-control"
                               value="${subField.defaultValue || ''}"
                               data-binding-key="${subField.bindingKey}"
                               data-sub-index="${index}"
                               data-field-type="supplement-sub"
                               placeholder="原${subField.label}"
                               style="min-width: ${subField.width || 120};">
                    `;
                });

                originHtml += '</div></div>';

                return newHtml + originHtml;
            }

            // 分离不同类型的配置项并赋值给全局变量
            gSelectItems = sortInputItems(inputItems.filter(item => item.inputType === 'select'));
            gRadioItems = sortInputItems(inputItems.filter(item => item.inputType === 'radio'));

            // 将 input 类型按 type 进一步细分为 number、text、date
            gNumberInputItems = sortInputItems(inputItems.filter(item =>
                item.inputType === 'input' && item.type === 'number'
            ));
            gTextInputItems = sortInputItems(inputItems.filter(item =>
                item.inputType === 'input' && item.type === 'text'
            ));
            gDateInputItems = sortInputItems(inputItems.filter(item =>
                item.inputType === 'input' && item.type === 'date'
            ));
            gSupplementItems = sortInputItems(inputItems.filter(item =>
                item.inputType === 'supplement'
            ));

            // 生成下拉框（每种一行）
            const selectContainer = document.getElementById('selectContainer');
            if (gSelectItems.length > 0) {
                selectContainer.innerHTML = gSelectItems.map(item => generateSelectHtml(item)).join('');
            }

            // 生成单选框（每种一行）
            const radioContainer = document.getElementById('radioContainer');
            if (gRadioItems.length > 0) {
                radioContainer.innerHTML = gRadioItems.map(item => generateRadioHtml(item)).join('');
            }

            // 生成数值类型输入框（所有新值一行，所有原值一行）
            const numberInputContainer = document.getElementById('numberInputContainer');
            if (gNumberInputItems.length > 0) {
                numberInputContainer.innerHTML = generateInputHtml(gNumberInputItems);
            }

            // 生成文本类型输入框（所有新值一行，所有原值一行）
            const textInputContainer = document.getElementById('textInputContainer');
            if (gTextInputItems.length > 0) {
                textInputContainer.innerHTML = generateInputHtml(gTextInputItems);
            }

            // 生成日期类型输入框（所有新值一行，所有原值一行）
            const dateInputContainer = document.getElementById('dateInputContainer');
            if (gDateInputItems.length > 0) {
                dateInputContainer.innerHTML = generateInputHtml(gDateInputItems);
            }

            // 生成补充框（每个补充框独立一行）
            const supplementContainer = document.getElementById('supplementContainer');
            if (gSupplementItems.length > 0) {
                supplementContainer.innerHTML = gSupplementItems.map(item => generateSupplementHtml(item)).join('');
            }

            /**
             * 初始化 Layui 组件（在 HTML 生成完成后执行）
             */
            layui.use(['form', 'laydate'], function () {
                var form = layui.form;
                var laydate = layui.laydate;
                var $ = layui.$;

                // 重新渲染所有 select 组件（Layui 会自动识别带有 lay-search 的 select）
                form.render('select');

                // 为所有 select 添加 change 事件监听
                gSelectItems.forEach(function (item) {
                    const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                    const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                    // 监听新值选择
                    form.on('select(' + newId + ')', function (data) {
                        $(this.elem).attr('data-selected-value', data.value);
                    });

                    // 监听原值选择
                    form.on('select(' + originId + ')', function (data) {
                        $(this.elem).attr('data-selected-value', data.value);
                    });
                });

                // 查找所有 date 类型的输入框并初始化 laydate
                gDateInputItems.forEach(function (item) {
                    const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                    const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                    // 初始化新值日期选择器
                    laydate.render({
                        elem: '#' + newId,
                        format: 'yyyyMMdd',
                        trigger: 'click',
                        position: 'bottom',
                        btns: ['clear', 'now', 'confirm'],
                        value: item.newDefaultValue || null
                    });

                    // 初始化原值日期选择器
                    laydate.render({
                        elem: '#' + originId,
                        format: 'yyyyMMdd',
                        trigger: 'click',
                        position: 'bottom',
                        btns: ['clear', 'now', 'confirm'],
                        value: item.originDefaultValue || null
                    });
                });
            });


        };
    </script>


{% endblock %}
