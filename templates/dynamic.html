{% extends "base.html" %}

{% block title %}{% endblock %}

{% block main_content %}
    <div class="container-fluid p-0">
        <h4 class="mb-4" id="formName"></h4>

        <div class="card">
            <div class="card-body">
                <div class="row g-3 align-items-center">
                    <div class="input-group mb-3" style="width: 1200px">
                        <span class="input-group-text" required>onesLink</span>
                        <input type="text" id="onesLink" class="form-control" placeholder="onesLink">
                    </div>
                </div>
                <div class="row g-3 align-items-center">
                    <div class="input-group mb-3" style="width: 500px">
                        <span class="input-group-text">文件名</span>
                        <input type="text" id="filePrefix" class="form-control" readonly>
                        <button class="btn btn-outline-secondary" type="button" onclick="toggleEdit('filePrefix', this)"
                                title="点击编辑">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                    </div>
                </div>
                <div class="row g-3 align-items-center">
                    <div class="input-group mb-3" style="width: 500px">
                        <span class="input-group-text">编号</span>
                        <input type="text" id="dynamicNo" class="form-control" readonly>
                        <button class="btn btn-outline-secondary" type="button" onclick="toggleEdit('dynamicNo', this)"
                                title="点击编辑">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                    </div>
                </div>
                <div class="row g-3 align-items-center">
                    <div class="input-group mb-3" style="width: 500px">
                        <span class="input-group-text">操作备注</span>
                        <input type="text" id="ops_remark" class="form-control" readonly>
                        <button class="btn btn-outline-secondary" type="button" onclick="toggleEdit('ops_remark', this)"
                                title="点击编辑">
                            <i class="bi bi-pencil-square"></i>
                        </button>
                    </div>
                </div>

                <h4>查询字段</h4>
                <hr class="layui-border-blue">
                <!-- 动态生成的文本类型输入框容器 -->
                <div id="queryContainer">
                    <!-- 所有文本类型的新值在一行，所有原值在一行 -->
                </div>


                <h4>修改字段</h4>
                <hr class="layui-border-blue">
                <!-- 动态生成的下拉框容器 -->
                <div id="selectContainer">
                    <!-- 每种下拉框单独一行 -->
                </div>

                <!-- 动态生成的单选框容器 -->
                <div id="radioContainer">
                    <!-- 每种单选框单独一行 -->
                </div>

                <!-- 动态生成的数值类型输入框容器 -->
                <div id="numberInputContainer">
                    <!-- 所有数值类型的新值在一行，所有原值在一行 -->
                </div>

                <!-- 动态生成的文本类型输入框容器 -->
                <div id="textInputContainer">
                    <!-- 所有文本类型的新值在一行，所有原值在一行 -->
                </div>

                <!-- 动态生成的日期类型输入框容器 -->
                <div id="dateInputContainer">
                    <!-- 所有日期类型的新值在一行，所有原值在一行 -->
                </div>

                <!-- 动态生成的补充框容器 -->
                <div id="supplementContainer">
                    <!-- 每个补充框单独一行，包含主输入框和子输入框 -->
                </div>
                <!--下载导入模板链接  批量导入按钮-->
                <!-- 功能按钮区域 -->
                <div class="row g-3 align-items-center mb-4">
                    <div class="col-auto">
                        <a href="javascript:void(0)" onclick="downloadTemplate()" class="btn btn-outline-primary"
                           id="downloadTemplateBtn">
                            <i class="bi bi-download"></i> 下载导入模板
                        </a>
                    </div>
                    <div class="col-auto">
                        <input type="file" id="batchImportFile" accept=".xlsx" style="display: none;"
                               onchange="handleBatchImportFile(this)">
                        <button type="button" onclick="document.getElementById('batchImportFile').click()"
                                class="btn btn-outline-success"
                                id="batchImportBtn">
                            <i class="bi bi-upload"></i> 批量导入
                        </button>
                    </div>
                    <div class="col-auto">
                        <span id="batchImportFileName" style="color: #666; margin-left: 10px;"></span>
                    </div>
                </div>

                <!-- 提交结果显示区域 -->
                <div id="submitResultArea" style="display: none; margin-bottom: 20px;">
                    <div class="alert" id="resultAlert" role="alert">
                        <h5 class="alert-heading" id="resultTitle"></h5>
                        <p id="resultMessage"></p>
                        <hr>
                        <div id="resultActions"></div>
                    </div>
                </div>
                <button onclick="submit()" class="layui-btn">提交</button>


            </div>
        </div>
    </div>

    <!-- 引入 Layui 样式 -->
    <link rel="stylesheet" href="/static/layui/css/layui.css">

    <!-- 引入 JS 库 -->
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/layui/layui.js"></script>

    <script>

        /**
         * 存储批量导入的文件
         */
        let batchImportFile = null;

        // 存储所有 Layui 日期选择器实例
        const laydateInstances = [];

        // 全局配置对象
        let dynamicTableConfig = null;
        // 存储所有 Layui dropdown 实例
        const dropdownInstances = [];

        // 全局变量：配置项数组
        let gSelectItems = [];
        let gRadioItems = [];
        let gNumberInputItems = [];
        let gTextInputItems = [];
        let gDateInputItems = [];
        let gSupplementItems = [];


        // 存储当前激活的输入框信息
        let currentActiveInput = null;

        // 存储 Layui 表格弹出层实例
        let tableLayerIndex = null;

        /**
         * 切换输入框的编辑状态
         * @param {string} inputId - 输入框ID
         * @param {HTMLElement} button - 按钮元素
         */
        window.toggleEdit = function (inputId, button) {
            const input = document.getElementById(inputId);
            if (!input) return;

            const isReadonly = input.hasAttribute('readonly');

            if (isReadonly) {
                // 切换到编辑状态
                input.removeAttribute('readonly');
                input.focus();

                // 更改按钮图标和提示
                button.innerHTML = '<i class="bi bi-check-lg"></i>';
                button.title = '完成编辑';
                button.classList.remove('btn-outline-secondary');
                button.classList.add('btn-success');

                // 添加失去焦点事件，自动恢复只读
                input.addEventListener('blur', function handler() {
                    toggleEdit(inputId, button);
                    input.removeEventListener('blur', handler);
                }, {once: true});
            } else {
                // 切换到只读状态
                input.setAttribute('readonly', 'readonly');

                // 恢复按钮图标和提示
                button.innerHTML = '<i class="bi bi-pencil-square"></i>';
                button.title = '点击编辑';
                button.classList.remove('btn-success');
                button.classList.add('btn-outline-secondary');
            }
        };

        /**
         * 从ones链接中解析内容
         * @param {string} url - ones链接
         * @returns {Object} 解析结果 {taskId, taskName}
         */
        function parseOnesLink(url) {
            if (!url || typeof url !== 'string') {
                return null;
            }

            try {
                // 匹配格式: #72480 框架协议导入-崔正华 https://...
                // 或者从URL中提取任务信息

                // 方法1: 尝试从URL路径中提取任务ID
                // 例如: /task/QGTJmPVYqMYfCdRb
                const taskMatch = url.match(/\/task\/([A-Za-z0-9]+)/);

                // 方法2: 尝试从文本中提取 #编号 和 任务名称
                // 例如: #72480 框架协议导入-崔正华
                const hashMatch = url.match(/#(\d+)\s+([^\shttps]+)/);

                if (hashMatch) {
                    return {
                        taskId: hashMatch[1],
                        taskName: hashMatch[2]
                    };
                }

                // 如果URL中包含任务信息，尝试从页面标题或其他地方获取
                // 这里暂时返回null，需要用户手动输入或通过API获取
                if (taskMatch) {
                    console.log('从URL中提取到任务ID:', taskMatch[1]);
                    // 注意：仅从URL无法获取任务名称，需要通过API查询
                    return {
                        taskId: taskMatch[1],
                        taskName: null
                    };
                }

                return null;
            } catch (error) {
                console.error('解析ones链接失败:', error);
                return null;
            }
        }

        /**
         * 根据ones链接自动填充字段
         */
        function autoFillFromOnesLink() {
            const onesLinkInput = document.getElementById('onesLink');
            if (!onesLinkInput) return;

            const url = onesLinkInput.value.trim();
            if (!url) return;

            const parsed = parseOnesLink(url);
            if (!parsed) {
                console.log('无法从链接中解析出任务信息');
                return;
            }
            console.log('解析结果:', parsed);

            // 填充编号
            if (parsed.taskId) {
                const dynamicNoInput = document.getElementById('dynamicNo');
                if (dynamicNoInput) {
                    dynamicNoInput.value = parsed.taskId;
                    console.log('已填充编号:', parsed.taskId);

                    // 清除该字段的错误样式
                    clearFieldError(dynamicNoInput, 'error_dynamicNo');
                }
            }

           // 填充操作备注
            if (parsed.taskName) {
                const opsRemarkInput = document.getElementById('ops_remark');
                if (opsRemarkInput) {
                    opsRemarkInput.value = parsed.taskId + ' ' + parsed.taskName;
                    console.log('已填充操作备注:', parsed.taskId + ' ' + parsed.taskName);

                    // 清除该字段的错误样式
                    clearFieldError(opsRemarkInput, 'error_ops_remark');
                }
            }

            // 文件名使用动态表单的名称
            const formNameElement = document.getElementById('formName');
            if (formNameElement && dynamicTableConfig) {
                const filePrefixInput = document.getElementById('filePrefix');
                if (filePrefixInput) {
                    filePrefixInput.value = dynamicTableConfig.formName;
                    console.log('已填充文件名:', dynamicTableConfig.formName);

                    // 清除该字段的错误样式
                    clearFieldError(filePrefixInput, 'error_filePrefix');
                }
            }
        }


        /**
         * 获取所有输入框的值（全局方法）
         */
        window.getAllFormValues = function () {
            var result = {};
            var $ = layui.$;

            // 1. 获取查询字段的值（动态生成的）
            gQueryItems.forEach(function (item) {
                const queryId = item.bindingKey;
                const queryVal = $('#' + queryId).val() || '';

                result[item.bindingKey] = {
                    label: item.label,
                    value: queryVal,
                    inputType: 'query',
                    fieldType: item.type,
                    ValidRule: item.ValidRule,
                };
            });

            // 2. 获取公用字段的值（硬编码的三个输入框）
            // 文件名
            const filePrefixVal = $('#filePrefix').val() || '';
            result['filePrefix'] = {
                value: filePrefixVal,
                inputType: 'common',
                fieldType: 'text'
            };

            // OnesLink
            const onesLinkVal = $('#onesLink').val() || '';
            result['onesLink'] = {
                value: onesLinkVal,
                inputType: 'common',
                fieldType: 'text'
            };

            // 动态编号
            const dynamicNoVal = $('#dynamicNo').val() || '';
            result['dynamicNo'] = {
                value: dynamicNoVal,
                inputType: 'common',
                fieldType: 'text'
            };

            // 操作备注
            const opsRemarkVal = $('#ops_remark').val() || '';
            result['ops_remark'] = {
                value: opsRemarkVal,
                inputType: 'common',
                fieldType: 'text'
            };


            // 3. 获取下拉框的值
            gSelectItems.forEach(function (item) {
                const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                // 使用 jQuery 直接获取 select 的选中值
                const newVal = $('#' + newId).val() || '';
                const originVal = $('#' + originId).val() || '';

                {#console.log("newId", newId);#}
                {#console.log("newVal", newVal);#}
                {#console.log("originVal", originVal);#}

                result[item.bindingKey] = {
                    label: item.label,
                    newValue: newVal,
                    originValue: originVal,
                    inputType: 'select',
                    newValidRule: item.newValidRule,
                    originValidRule: item.originValidRule
                };
            });


            // 4. 获取单选框的值
            gRadioItems.forEach(function (item) {
                const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                // 获取选中的单选框值
                const checkedRadio = $('input[name="' + newId + '"]:checked');
                const newVal = checkedRadio.length > 0 ? checkedRadio.val() : '';
                const originVal = !newVal;

                result[item.bindingKey] = {
                    label: item.label,
                    newValue: newVal,
                    originValue: originVal,
                    inputType: 'radio',
                    ValidRule: item.newValidRule
                };
            });

            // 5. 获取普通输入框的值（包括数值、文本、日期）
            gNumberInputItems.concat(gTextInputItems).concat(gDateInputItems).forEach(function (item) {
                const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                const newVal = $('#' + newId).val() || '';
                const originVal = $('#' + originId).val() || '';

                result[item.bindingKey] = {
                    label: item.label,
                    newValue: newVal,
                    originValue: originVal,
                    inputType: item.type,
                    fieldType: item.inputType,
                    newValidRule: item.newValidRule,
                    originValidRule: item.originValidRule
                };
            });


            // 6. 获取补充框的值
            gSupplementItems.forEach(function (item) {
                const mainNewId = `newMain${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const mainOriginId = `originMain${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                const mainNewVal = $('#' + mainNewId).val() || '';
                const mainOriginVal = $('#' + mainOriginId).val() || '';

                // 存储主输入框的值
                result[item.bindingKey] = {
                    label: item.label,
                    newValue: mainNewVal,
                    originValue: mainOriginVal,
                    inputType: 'supplement',
                    fieldType: 'supplement'
                };

                // 存储每个子输入框的值（使用独立的 bindingKey）
                item.subFields.forEach((subField, index) => {
                    const subNewId = `newSub${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}_${index}`;
                    const subOriginId = `originSub${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}_${index}`;

                    const subNewVal = $('#' + subNewId).val() || '';
                    const subOriginVal = $('#' + subOriginId).val() || '';

                    result[subField.bindingKey] = {
                        newValue: subNewVal,
                        originValue: subOriginVal,
                        inputType: 'supplement-sub',
                        fieldType: 'supplement-sub',
                        parentKey: item.bindingKey
                    };
                });
            });

            return result;
        };

        /**
         * 获取查询字段的值（单独的方法）
         */
        window.getQueryFieldValues = function () {
            var result = {};
            var $ = layui.$;

            // 获取动态生成的查询字段
            gQueryItems.forEach(function (item) {
                const queryId = `query${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                result[item.bindingKey] = $('#' + queryId).val() || '';
            });

            // 获取硬编码的公用字段
            result['filePrefix'] = $('#filePrefix').val() || '';
            result['onesLink'] = $('#onesLink').val() || '';
            result['dynamicNo'] = $('#dynamicNo').val() || '';

            console.log('查询字段值:', result);
            return result;
        };


        /**
         * 处理补充框值变化的全局函数
         * @param {string} bindingKey - 绑定键
         * @param {HTMLElement} element - 触发事件的元素
         */
        window.supplementContainerChange = async function (bindingKey, element) {
            const value = element.value;
            const fieldType = element.getAttribute('data-field-type');

            console.log('=== 补充框值变化 ===');
            console.log('bindingKey:', bindingKey);
            console.log('value:', value);
            console.log('fieldType:', fieldType);
            console.log('element.id:', element.id);
            console.log('是否为原值输入框:', element.id.startsWith('originMain'));

            // 记录当前激活的输入框
            currentActiveInput = {
                bindingKey: bindingKey,
                element: element,
                fieldType: fieldType
            };

            // 如果值为空，不显示弹出框
            if (!value || value.trim() === '') {
                console.log('值为空，不显示弹出框');
                return;
            }

            // 获取当前补充框的配置项
            const currentSupplementItem = gSupplementItems.find(item => item.bindingKey === bindingKey);

            if (!currentSupplementItem) {
                console.error('未找到对应的补充框配置:', bindingKey);
                return;
            }

            // 确定主字段名称（支持配置或默认）
            const mainField = currentSupplementItem.mainField || 'main_value';

            // 从后端查询数据
            let filteredData = [];
            try {
                filteredData = await querySupplementData(currentSupplementItem, value);
            } catch (error) {
                console.error('查询数据失败：', error);
                alert('查询数据失败：' + error.message);
                return;
            }

            console.log('过滤后的数据:', filteredData);

            // 如果没有匹配的数据
            if (filteredData.length === 0) {
                const fieldLabel = currentSupplementItem.label || bindingKey;

                // 原值输入框：不提示错误，不清空主字段，但清空子字段
                if (element.id.startsWith('originMain')) {
                    console.log('原值未找到匹配数据，保留主字段，清空子字段');

                    // 不清空主字段，保留用户输入的值
                    // element.value 保持不变

                    // 只清空所有子输入框
                    currentSupplementItem.subFields.forEach((subField, index) => {
                        const subTargetId = `originSub${currentSupplementItem.bindingKey.charAt(0).toUpperCase() + currentSupplementItem.bindingKey.slice(1)}_${index}`;
                        const subInput = document.getElementById(subTargetId);
                        if (subInput) {
                            subInput.value = '';
                            console.log('已清原子字段:', subTargetId);
                        }
                    });
                } else {
                    // 新值输入框：提示错误并清空主字段和子字段
                    console.error('无效的值，未找到匹配数据');
                    alert(`新${fieldLabel}："${value}"未找到匹配数据，请重新输入`);
                    element.value = '';

                    // 清空所有子输入框
                    currentSupplementItem.subFields.forEach((subField, index) => {
                        const subTargetId = `newSub${currentSupplementItem.bindingKey.charAt(0).toUpperCase() + currentSupplementItem.bindingKey.slice(1)}_${index}`;
                        const subInput = document.getElementById(subTargetId);
                        if (subInput) {
                            subInput.value = '';
                            console.log('已清原子字段:', subTargetId);
                        }
                    });
                }
                return;
            }


            // 如果只有一个匹配结果，并且是完全匹配，直接填充
            if (filteredData.length === 1) {
                const isExactMatch = String(filteredData[0][mainField]).toLowerCase() === value.toLowerCase();

                if (isExactMatch) {
                    console.log('完全匹配，直接填充');
                    fillInputWithData(filteredData[0], currentSupplementItem, element);

                    // 清除可能存在的错误提示
                    const errorElement = document.getElementById(`error_${element.id}`);
                    if (errorElement) {
                        errorElement.remove();
                    }

                    // 恢复输入框样式
                    element.style.borderColor = '';
                    element.style.boxShadow = '';
                    element.style.backgroundColor = '';
                    return;
                }
            }

            // 多个匹配结果或非完全匹配，显示表格选择框
            console.log('显示表格选择框');
            showTablePicker(bindingKey, value, fieldType, filteredData);
        };


        function querySupplementData(supplementItem, searchValue) {
            return new Promise((resolve, reject) => {
                const tableName = supplementItem.mainTable;
                const mainField = supplementItem.mainField;
                const subFields = supplementItem.subFields || [];

                console.log('=== 补充框查询参数 ===');
                console.log('supplementItem:', supplementItem);
                console.log('tableName:', tableName);
                console.log('mainField:', mainField);
                console.log('subFields:', subFields);
                console.log('searchValue:', searchValue);
                console.log('=====================');

                if (!tableName || !mainField) {
                    console.error('补充框配置不完整：缺少表名或主字段');
                    console.error('请检查表单配置中是否正确设置了补充框的主表和主字段');
                    resolve([]);
                    return;
                }

                fetch('/api/supplement/query/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        tableName: tableName,
                        mainField: mainField,
                        subFields: subFields,
                        searchValue: searchValue || ''
                    })
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            console.log(`从后端获取到 ${data.count} 条数据`);
                            resolve(data.data);
                        } else {
                            console.error('查询失败：', data.message);
                            reject(new Error(data.message));
                        }
                    })
                    .catch(error => {
                        console.error('请求失败：', error);
                        reject(error);
                    });
            });
        }


        /**
         * 显示表格选择器（类似日期选择器的效果）
         * @param {string} bindingKey - 当前编辑的字段绑定键
         * @param {string} currentValue - 当前值
         * @param {string} fieldType - 字段类型
         * @param {Array} data - 表格数据（可选，默认使用 mockData）
         */
        window.showTablePicker = async function (bindingKey, currentValue, fieldType, data) {
            console.log('=== showTablePicker 被调用 ===');
            console.log('bindingKey:', bindingKey);
            console.log('currentActiveInput:', currentActiveInput);

            // 确保 Layui 已加载
            if (typeof layui === 'undefined') {
                console.error('Layui 未加载!');
                return;
            }

            var $ = layui.$;
            var table = layui.table;
            var layer = layui.layer;

            console.log('layui 组件状态:', {
                $: !!$,
                table: !!table,
                layer: !!layer
            });

            if (!table) {
                console.error('Layui table 模块未加载！请使用 layui.use(["table", "layer"], ...) 加载');
                alert('表格模块未加载，请检查控制台错误');
                return;
            }

            if (!layer) {
                console.error('Layui layer 模块未加载！');
                alert('弹出层模块未加载');
                return;
            }

            // 关闭之前的弹出层（如果有）
            if (tableLayerIndex !== null) {

        /**
         * 下载导入模板
         */
        window.downloadTemplate = function () {
            // 显示加载提示
            const loadingIndex = layui.layer.load(2);

            // 发送配置到后端生成 Excel 模板
            axios.post('/api/dynamic/download-template/', {
                config: dynamicTableConfig
            }, {
                responseType: 'blob'  // 重要：指定响应类型为二进制流
            })
                .then(function (response) {
                    layui.layer.close(loadingIndex);

                    // 创建下载链接
                    const blob = new Blob([response.data], {
                        type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
                    });
                    // 从 Content-Disposition 头获取文件名
                    const contentDisposition = response.headers['content-disposition'];
                    let filename = '模板.xlsx';

                    if (contentDisposition) {
                        // 尝试匹配 filename* (RFC 5987 标准，UTF-8 编码)
                        const filenameStarMatch = contentDisposition.match(/filename\*\s*=\s*UTF-8''([^;]+)/i);
                        if (filenameStarMatch && filenameStarMatch[1]) {
                            filename = decodeURIComponent(filenameStarMatch[1]);
                        } else {
                            // 回退到普通 filename 匹配
                            const filenameMatch = contentDisposition.match(/filename="?([^";]+)"?/);
                            if (filenameMatch && filenameMatch[1]) {
                                filename = decodeURIComponent(filenameMatch[1]);
                            }
                        }
                    }


                    // 触发下载
                    const url = window.URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = url;
                    link.download = filename;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    window.URL.revokeObjectURL(url);

                    layui.layer.msg('模板下载成功！', {icon: 1});
                })
                .catch(function (error) {
                    layui.layer.close(loadingIndex);
                    console.error('下载失败:', error);

                    let errorMsg = '下载失败';
                    if (error.response) {
                        errorMsg = error.response.data?.message || `服务器错误：${error.response.status}`;
                    } else if (error.request) {
                        errorMsg = '无法连接到服务器';
                    } else {
                        errorMsg = error.message;
                    }

                    layui.layer.msg(errorMsg, {icon: 2});
                });
        };

        /**
         * 格式化文件大小
         */
        function formatFileSize(bytes) {
            if (bytes < 1024) {
                return bytes + ' B';
            } else if (bytes < 1024 * 1024) {
                return (bytes / 1024).toFixed(2) + ' KB';
            } else {
                return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
            }
        }

        /**
         * 为输入框添加错误标记并监听输入事件
         * @param {HTMLElement} element - 输入框元素
         * @param {string} errorId - 错误元素 ID
         * @param {string} errorMessage - 错误信息
         */
        function markAsError(element, errorId, errorMessage) {
            // 设置边框样式
            element.style.borderColor = '#ff4d4f';
            element.style.boxShadow = '0 0 0 2px rgba(255, 77, 79, 0.2)';
            element.style.backgroundColor = '#fff1f0';

            // 添加或更新错误描述
            addOrUpdateError(element, errorId, errorMessage);

            // 监听输入事件，输入时清除错误样式
            const eventType = element.type === 'radio' || element.type === 'checkbox' ? 'change' : 'input';

            // 如果已经有监听器，先移除
            if (element._clearErrorHandler) {
                element.removeEventListener(eventType, element._clearErrorHandler);
            }

            // 创建新的事件监听器
            const clearHandler = function () {
                clearError(element, errorId);
                // 不再移除监听器，让它持续有效
            };

            // 保存监听器引用
            element._clearErrorHandler = clearHandler;

            // 添加事件监听器
            element.addEventListener(eventType, clearHandler);
        }

        /**
         * 在输入框下方添加或更新错误描述
         * @param {HTMLElement} inputElement - 输入框元素（input、select 或 radio）
         * @param {string} errorId - 错误元素 ID
         * @param {string} errorMessage - 错误信息
         */
        function addOrUpdateError(inputElement, errorId, errorMessage) {
            console.log(errorId)
            // 检查是否已存在错误提示
            let errorElement = document.getElementById(errorId);

            if (!errorElement) {
                // 创建错误提示元素
                errorElement = document.createElement('div');
                errorElement.id = errorId;
                errorElement.className = 'form-control-feedback';

                // 设置样式：红色文字、小字号、顶部间距
                errorElement.style.cssText = `
                  display:flex;
                  align-items:center;
                  padding:.375rem .75rem;
                  font-size:1rem;
                  font-weight:400;
                  line-height:1.5;
                  color:red;
                `;

                // 判断是否为下拉框元素
                const isSelect = inputElement.tagName === 'SELECT';

                // 判断是否为单选框元素
                const isRadio = inputElement.type === 'radio';

                if (isSelect) {
                    // 下拉框的特殊处理：找到 layui 渲染的容器
                    const layuiInputInline = inputElement.closest('.layui-input-inline');

                    if (layuiInputInline) {
                        // 在 layui-input-inline 容器后插入错误提示
                        if (layuiInputInline.nextSibling) {
                            layuiInputInline.parentNode.insertBefore(errorElement, layuiInputInline.nextSibling);
                        } else {
                            layuiInputInline.parentNode.appendChild(errorElement);
                        }
                    } else {
                        // 如果没有找到 layui 容器，回退到普通处理
                        const parentGroup = inputElement.closest('.input-group') || inputElement.parentElement;
                        if (parentGroup) {
                            if (inputElement.nextSibling) {
                                parentGroup.insertBefore(errorElement, inputElement.nextSibling);
                            } else {
                                parentGroup.appendChild(errorElement);
                            }
                        }
                    }
                } else if (isRadio) {
                    // 单选框的特殊处理：找到最近的 .input-group 容器
                    const parentGroup = inputElement.closest('.input-group');

                    if (parentGroup) {
                        // 在 .input-group 之后插入错误提示（而不是在其内部）
                        if (parentGroup.nextSibling) {
                            parentGroup.parentNode.insertBefore(errorElement, parentGroup.nextSibling);
                        } else {
                            parentGroup.parentNode.appendChild(errorElement);
                        }
                    } else {
                        // 回退到普通处理
                        const wrapperDiv = inputElement.closest('div[class*="layui-form-radio"]') || inputElement.parentElement;
                        if (wrapperDiv) {
                            if (wrapperDiv.nextSibling) {
                                wrapperDiv.parentNode.insertBefore(errorElement, wrapperDiv.nextSibling);
                            } else {
                                wrapperDiv.parentNode.appendChild(errorElement);
                            }
                        }
                    }
                } else {
                    // 普通输入框的处理逻辑
                    const parentGroup = inputElement.closest('.input-group') || inputElement.parentElement;

                    if (parentGroup) {
                        // 在输入框之后插入错误提示
                        if (inputElement.nextSibling) {
                            parentGroup.insertBefore(errorElement, inputElement.nextSibling);
                        } else {
                            parentGroup.appendChild(errorElement);
                        }
                    } else {
                        // 如果没有找到父容器，直接在输入框后插入
                        if (inputElement.parentNode) {
                            if (inputElement.nextSibling) {
                                inputElement.parentNode.insertBefore(errorElement, inputElement.nextSibling);
                            } else {
                                inputElement.parentNode.appendChild(errorElement);
                            }
                        }
                    }
                }
            }

            // 更新错误信息
            errorElement.textContent = errorMessage;
        }

        /**
         * 清除输入框的错误提示和样式
         * @param {HTMLElement} inputElement - 输入框元素
         * @param {string} errorId - 错误元素 ID
         */
        function clearError(inputElement, errorId) {
            // 清除错误提示元素
            const errorElement = document.getElementById(errorId);
            if (errorElement) {
                errorElement.remove();
            }

            // 恢复输入框样式
            inputElement.style.borderColor = '';
            inputElement.style.boxShadow = '';
            inputElement.style.backgroundColor = '';
        }


        /**
         * 提交表单
         */
        window.submit = function () {
            if (!layui.$) {
                console.error('Layui 尚未完全加载，请稍后再试');
                return null;
            }

            // 如果有批量导入文件，跳过表单校验，直接走批量导入逻辑
            if (batchImportFile) {
                // 即使是批量导入，也要校验公共字段
                const commonFieldsValid = validateCommonFields();
                if (!commonFieldsValid) {
                    return;
                }

                submitWithBatchImport();
                return;
            }

            var hasError = false;

            // 获取所有表单值
            const allValues = window.getAllFormValues();
            console.log('=== 所有输入框的值 ===');

            // 遍历所有值进行校验
            for (const [key, item] of Object.entries(allValues)) {
                let element = null;
                let errorId = null;
                let errorLabel = null;

                // 文本、数值、日期、下拉框 做校验
                if (item.inputType === 'text' || item.inputType === 'number' || item.inputType === 'date' || item.inputType === 'select') {
                    // 新值校验
                    if ((item.newValue === '' || item.newValue === null || item.newValue === undefined) && item.newValidRule === 'required') {
                        const newId = `new${key.charAt(0).toUpperCase() + key.slice(1)}`;
                        element = document.getElementById(newId);
                        errorId = `error_${newId}`;
                        errorLabel = `新${item.label}不能为空`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }

                    // 原值校验
                    if ((item.originValue === '' || item.originValue === null || item.originValue === undefined) && item.originValidRule === 'required') {
                        const originId = `origin${key.charAt(0).toUpperCase() + key.slice(1)}`;
                        element = document.getElementById(originId);
                        errorId = `error_${originId}`;
                        errorLabel = `原${item.label} 不能为空`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }
                }

                // 查询字段和单选框做校验
                if (item.inputType === 'radio' || item.inputType === 'query') {
                    let newId;
                    let errorLabel;
                    let elementValue;
                    // 兼容 ValidRule 和 newValidRule 两种属性名
                    let validRule = item.ValidRule || item.newValidRule;

                    if (item.inputType === 'radio') {
                        // 单选框：ID 为 new 开头的字段，值在 newValue 中
                        newId = `new${key.charAt(0).toUpperCase() + key.slice(1)}`;
                        elementValue = item.newValue;
                        errorLabel = `新${item.label}不能为空`;
                    } else if (item.inputType === 'query') {
                        // 查询字段：直接使用字段名作为 ID，值在 value 中
                        newId = key;
                        elementValue = item.value;
                        errorLabel = `${item.label}不能为空`;
                    }

                    // 新值校验：检查空值和 required 规则
                    if ((elementValue === '' || elementValue === null || elementValue === undefined) && validRule === 'required') {
                        // 单选框特殊处理：通过 name 属性查找第一个 radio 元素
                        if (item.inputType === 'radio') {
                            element = document.querySelector(`input[name="${newId}"]`);
                        } else {
                            element = document.getElementById(newId);
                        }

                        const errorId = `error_${newId}`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }
                }

                // 公共字段校验（必填项）
                if (item.inputType === 'common') {
                    if ((item.value === '' || item.value === null || item.value === undefined)) {
                        element = document.getElementById(key);
                        errorId = `error_${key}`;
                        errorLabel = `${element ? element.previousElementSibling?.textContent || key : key}不能为空`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }
                }

                // 补充框主输入框校验（新值和原值都要校验）
                if (item.inputType === 'supplement' || item.inputType === 'supplement-main') {
                    // 获取补充框配置
                    const supplementItem = gSupplementItems.find(s => s.bindingKey === key);

                    // 新主输入框校验
                    if ((item.newValue === '' || item.newValue === null || item.newValue === undefined)) {
                        const mainNewId = `newMain${key.charAt(0).toUpperCase() + key.slice(1)}`;
                        element = document.getElementById(mainNewId);
                        errorId = `error_${mainNewId}`;
                        errorLabel = `新${item.label}不能为空`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }

                    // 原主输入框校验
                    if ((item.originValue === '' || item.originValue === null || item.originValue === undefined)) {
                        const mainOriginId = `originMain${key.charAt(0).toUpperCase() + key.slice(1)}`;
                        element = document.getElementById(mainOriginId);
                        errorId = `error_${mainOriginId}`;
                        errorLabel = `原${item.label}不能为空`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }
                }
            }

            if (hasError) {
                layui.layer.msg('请修正错误后重新提交', {icon: 2});
                return null;
            }

            // 没有错误，提交数据
            submitData();
        };

        /**
         * 校验公共字段
         */
        function validateCommonFields() {
            var hasError = false;
            const allValues = window.getAllFormValues();

            // 校验公共字段（包括操作备注）
            ['filePrefix', 'onesLink', 'dynamicNo', 'ops_remark'].forEach(function (key) {
                const item = allValues[key];
                if (item && (item.value === '' || item.value === null || item.value === undefined)) {
                    const element = document.getElementById(key);
                    const errorId = `error_${key}`;
                    const errorLabel = `${element ? element.previousElementSibling?.textContent || key : key}不能为空`;

                    if (element) {
                        markAsError(element, errorId, errorLabel);
                        console.error(errorLabel);
                        hasError = true;
                    }
                }
            });

            if (hasError) {
                layui.layer.msg('请填写公共字段信息', {icon: 2});
            }

            return !hasError;
        }

        /**
         * 处理批量导入文件选择
         */
        window.handleBatchImportFile = function (input) {
            const file = input.files[0];
            if (file) {
                if (!file.name.endsWith('.xlsx')) {
                    layui.layer.msg('仅支持 .xlsx 格式的 Excel 文件', {icon: 2});
                    input.value = '';
                    batchImportFile = null;
                    document.getElementById('batchImportFileName').textContent = '';
                    return;
                }

                // 清除除公共字段外的所有错误样式
                clearAllFieldErrors();

                batchImportFile = file;
                document.getElementById('batchImportFileName').textContent = '已选择：' + file.name + ' (' + formatFileSize(file.size) + ')';
                layui.layer.msg('文件已选择，请点击"提交"按钮进行导入', {icon: 1});
            }
        };


        function showSubmitResult(isSuccess, message, data, isBatchImport) {
            const resultArea = document.getElementById('submitResultArea');
            const resultAlert = document.getElementById('resultAlert');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');
            const resultActions = document.getElementById('resultActions');

            // 设置样式
            resultAlert.className = isSuccess ? 'alert alert-success' : 'alert alert-danger';
            resultTitle.textContent = isSuccess ? (isBatchImport ? '批量导入完成' : '提交成功') : (isBatchImport ? '批量导入失败' : '提交失败');
            resultMessage.textContent = message;

            // 清空操作按钮
            resultActions.innerHTML = '';

            // 根据情况添加操作按钮
            if (isSuccess && isBatchImport) {
                // 批量导入成功：显示 SQL 文件路径（如果有）
                if (data.sqlFilePath) {
                    const pathContainer = document.createElement('div');

                    const pathLabel = document.createElement('span');
                    pathLabel.className = 'text-muted me-2';
                    pathLabel.textContent = '保存位置:';

                    const pathText = document.createElement('code');
                    pathText.style.cssText = 'background: #f8f9fa; padding: 2px 6px; border-radius: 3px; font-size: 0.9em;';
                    pathText.textContent = data.sqlFilePath;

                    pathContainer.appendChild(pathLabel);
                    pathContainer.appendChild(pathText);
                    resultActions.appendChild(pathContainer);
                }

                // 如果有失败记录，显示失败文件路径
                if (data.excelFilePath) {
                    const pathContainer = document.createElement('div');
                    pathContainer.className = 'mt-2';

                    const pathLabel = document.createElement('span');
                    pathLabel.className = 'text-muted me-2';
                    pathLabel.textContent = '失败报告位置:';

                    const pathText = document.createElement('code');
                    pathText.style.cssText = 'background: #fff3cd; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; color: #856404;';
                    pathText.textContent = data.excelFilePath;

                    pathContainer.appendChild(pathLabel);
                    pathContainer.appendChild(pathText);
                    resultActions.appendChild(pathContainer);
                }

                // 显示统计信息
                if (data.totalRows !== undefined) {
                    const statsInfo = document.createElement('div');
                    statsInfo.className = 'text-muted mt-2';
                    statsInfo.textContent = `共${data.totalRows}条，成功${data.successCount}条，失败${data.failCount}条`;
                    resultActions.appendChild(statsInfo);
                }
            } else if (!isSuccess && isBatchImport && data && data.excelFilePath) {
                // 批量导入失败：显示失败文件路径
                const pathContainer = document.createElement('div');

                const pathLabel = document.createElement('span');
                pathLabel.className = 'text-muted me-2';
                pathLabel.textContent = '失败报告位置:';

                const pathText = document.createElement('code');
                pathText.style.cssText = 'background: #fff3cd; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; color: #856404;';
                pathText.textContent = data.excelFilePath;

                pathContainer.appendChild(pathLabel);
                pathContainer.appendChild(pathText);
                resultActions.appendChild(pathContainer);
            } else if (isSuccess && !isBatchImport && data && data.filePath) {
                // 单条导入成功：显示文件完整路径
                const pathContainer = document.createElement('div');

                const pathLabel = document.createElement('span');
                pathLabel.className = 'text-muted me-2';
                pathLabel.textContent = '保存位置:';

                const pathText = document.createElement('code');
                pathText.style.cssText = 'background: #f8f9fa; padding: 2px 6px; border-radius: 3px; font-size: 0.9em;';
                pathText.textContent = data.filePath;

                pathContainer.appendChild(pathLabel);
                pathContainer.appendChild(pathText);
                resultActions.appendChild(pathContainer);
            }

            // 显示结果区域
            resultArea.style.display = 'block';

            // 滚动到结果区域
            resultArea.scrollIntoView({behavior: 'smooth', block: 'nearest'});
        }


        /**
         * 带批量导入的提交
         */
        function submitWithBatchImport() {
            const loadingIndex = layui.layer.load(2);

            // 获取公共字段的值
            const queryValues = window.getQueryFieldValues();

            const formData = new FormData();
            formData.append('file', batchImportFile);
            formData.append('config', JSON.stringify(dynamicTableConfig));
            formData.append('queryValues', JSON.stringify(queryValues));

            axios.post('/api/dynamic/batch-import/', formData, {
                headers: {
                    'Content-Type': 'multipart/form-data'
                }
            })
                .then(function (response) {
                    layui.layer.close(loadingIndex);

                    if (response.data.success) {
                        // 成功：显示 SQL 文件路径和/或失败文件路径
                        showSubmitResult(true, response.data.message || '批量导入完成', {
                            sqlFilePath: response.data.sqlFilePath,
                            excelFilePath: response.data.excelFilePath,
                            totalRows: response.data.totalRows,
                            successCount: response.data.successCount,
                            failCount: response.data.failCount
                        }, true);
                    } else {
                        // 失败：显示失败文件下载链接
                        showSubmitResult(false, response.data.message || '批量导入失败', {
                            excelFilePath: response.data.excelFilePath
                        }, true);
                    }

                    // 清除已上传的文件
                    batchImportFile = null;
                    document.getElementById('batchImportFile').value = '';
                    document.getElementById('batchImportFileName').textContent = '';
                })
                .catch(function (error) {
                    layui.layer.close(loadingIndex);
                    console.error('导入失败:', error);

                    let errorMsg = '导入失败';
                    if (error.response && error.response.data) {
                        if (error.response.data.message) {
                            errorMsg = error.response.data.message;
                        }
                    } else if (error.response) {
                        errorMsg = `服务器错误：${error.response.status}`;
                    } else if (error.request) {
                        errorMsg = '无法连接到服务器';
                    } else {
                        errorMsg = error.message;
                    }

                    showSubmitResult(false, errorMsg, {}, true);
                });
        }

        /**
         * 普通提交（非批量导入）
         */
        function submitData() {
            const loadingIndex = layui.layer.load(2);

            // 获取所有表单值
            const allValues = window.getAllFormValues();
            
            // 调试：检查 config 中的 expressions
            console.log('[DEBUG SUBMIT] dynamicTableConfig.updateItems:', dynamicTableConfig.updateItems.map(item => ({
                label: item.label,
                bindingKey: item.bindingKey,
                inputType: item.inputType,
                hasExpressions: 'expressions' in item,
                expressions: item.expressions
            })));

            axios.post('/api/dynamic/submit/', {
                config: dynamicTableConfig,
                formValues: allValues
            })
                .then(function (response) {
                    layui.layer.close(loadingIndex);

                    if (response.data.success) {
                        // 成功：显示结果和文件路径
                        showSubmitResult(true, response.data.message || 'SQL 文件生成成功', {
                            filePath: response.data.filePath || ''
                        }, false);
                    } else {
                        // 失败：显示错误信息
                        showSubmitResult(false, response.data.message || '提交失败', {}, false);
                    }
                })
                .catch(function (error) {
                    layui.layer.close(loadingIndex);
                    console.error('提交失败:', error);

                    let errorMsg = '提交失败';
                    if (error.response && error.response.data) {
                        errorMsg = error.response.data.message || error.response.data.error || '服务器错误';
                    }

                    showSubmitResult(false, errorMsg, {}, false);
                });

        window.onload = function () {
            const formId = "{{ form_id }}";

            if (!formId) {
                alert('缺少表单ID参数');
                return;
            }

            fetch(`/api/form-config/${formId}/`)
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        dynamicTableConfig = data.data;

                        initializePage();
                    } else {
                        alert('加载配置失败：' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('加载配置失败，请检查网络连接');
                });
        };

                alert('配置未加载，请刷新页面重试');

            function sortInputItems(items) {

                               id="${queryId}"
                               class="form-control"

                               value="${item.originDefaultValue || ''}"
                               data-binding-key="${item.bindingKey}"
                               data-field-type="${item.type}">
                    `;
                    if (index < items.length - 1) {
                        originHtml += '<div style="width: 15px"></div>';
                    }
                });
                originHtml += '</div></div>';

                return newHtml + originHtml;
            }

            function generateSupplementHtml(item) {
                const mainNewId = `newMain${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const mainOriginId = `originMain${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                let newHtml = '<div class="row g-3 align-items-center mb-3"><div class="input-group">';

                newHtml += `
                    <span class="input-group-text" style=" background: greenyellow">新${item.label}</span>
                    <input type="text"
                           id="${mainNewId}"
                           class="form-control"
                           value=""
                           data-binding-key="${item.bindingKey}"
                           data-field-type="supplement-main"
                           placeholder="请输入${item.label}主值"
                            onchange="supplementContainerChange('${item.bindingKey}', this)"
                           style="max-width: 200px;">
                `;

                item.subFields.forEach((subField, index) => {
                    const subNewId = `newSub${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}_${index}`;
                    newHtml += `
                        <div style="width: 15px"></div>
                        <span class="input-group-text" style="max-width: ${subField.width || 80}px;">新${subField.label}</span>
                        <input type="text"
                               id="${subNewId}"
                               class="form-control"
                               value=""
                               data-binding-key="${subField.bindingKey}"
                               data-sub-index="${index}"
                               data-parent-binding-key="${item.bindingKey}"
                               data-field-type="supplement-sub"
                               placeholder="请输入${subField.label}"
                               style="min-width: ${subField.width || 120};">
                    `;
                });

                newHtml += '</div></div>';

                let originHtml = '<div class="row g-3 align-items-center mb-3"><div class="input-group">';

                originHtml += `
                    <span class="input-group-text" style="background: greenyellow;">原${item.label}</span>
                    <input type="text"
                           id="${mainOriginId}"
                           class="form-control"
                           value=""
                           data-binding-key="${item.bindingKey}"
                           data-field-type="supplement-main"
                           placeholder="原${item.label}主值"
                           onchange="supplementContainerChange('${item.bindingKey}', this)"
                           style="max-width: 200px;">
                `;

                item.subFields.forEach((subField, index) => {
                    const subOriginId = `originSub${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}_${index}`;
                    originHtml += `
                        <div style="width: 15px"></div>
                        <span class="input-group-text" style="max-width: ${subField.width || 80}px;">原${subField.label}</span>
                        <input type="text"
                               id="${subOriginId}"
                               class="form-control"
                               value=""
                               data-binding-key="${subField.bindingKey}"
                               data-sub-index="${index}"
                               data-parent-binding-key="${item.bindingKey}"
                               data-field-type="supplement-sub"
                               placeholder="原${subField.label}"
                               style="min-width: ${subField.width || 120};">
                    `;
                });

                originHtml += '</div></div>';

                return newHtml + originHtml;
            }


            gSelectItems = sortInputItems(dynamicTableConfig.updateItems.filter(item => item.inputType === 'select'));
            gRadioItems = sortInputItems(dynamicTableConfig.updateItems.filter(item => item.inputType === 'radio'));

            gNumberInputItems = sortInputItems(dynamicTableConfig.updateItems.filter(item =>
                item.inputType === 'input' && item.type === 'number'
            ));
            gTextInputItems = sortInputItems(dynamicTableConfig.updateItems.filter(item =>
                item.inputType === 'input' && item.type === 'text'
            ));
            gDateInputItems = sortInputItems(dynamicTableConfig.updateItems.filter(item =>
                item.inputType === 'input' && item.type === 'date'
            ));
            gSupplementItems = sortInputItems(dynamicTableConfig.updateItems.filter(item =>
                item.inputType === 'supplement'
            ));

            gQueryItems = sortInputItems(dynamicTableConfig.queryItems || []);

            const selectContainer = document.getElementById('selectContainer');
            if (gSelectItems.length > 0) {
                selectContainer.innerHTML = gSelectItems.map(item => generateSelectHtml(item)).join('');
            }

            const radioContainer = document.getElementById('radioContainer');
            if (gRadioItems.length > 0) {
                radioContainer.innerHTML = gRadioItems.map(item => generateRadioHtml(item)).join('');
            }

            const numberInputContainer = document.getElementById('numberInputContainer');
            if (gNumberInputItems.length > 0) {
                numberInputContainer.innerHTML = generateInputHtml(gNumberInputItems);
            }

            const textInputContainer = document.getElementById('textInputContainer');
            if (gTextInputItems.length > 0) {
                textInputContainer.innerHTML = generateInputHtml(gTextInputItems);
            }

            const dateInputContainer = document.getElementById('dateInputContainer');
            if (gDateInputItems.length > 0) {
                dateInputContainer.innerHTML = generateInputHtml(gDateInputItems);
            }

            const supplementContainer = document.getElementById('supplementContainer');
            if (gSupplementItems.length > 0) {
                supplementContainer.innerHTML = gSupplementItems.map(item => generateSupplementHtml(item)).join('');
            }

            // 4. 渲染查询字段（动态生成的）
            const queryContainer = document.getElementById('queryContainer');
            if (gQueryItems.length > 0) {
                queryContainer.innerHTML = generateQueryHtml(gQueryItems);
            }


            layui.use(['form', 'laydate', 'table', 'layer'], function () {
                var form = layui.form;
                var laydate = layui.laydate;
                var table = layui.table;
                var layer = layui.layer;
                var $ = layui.$;

                // 关键：先渲染所有表单元素
                form.render();

                gSelectItems.forEach(function (item) {
                    const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                    const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                    form.on('select(' + newId + ')', function (data) {
                        $(this.elem).attr('data-selected-value', data.value);
                    });

                    form.on('select(' + originId + ')', function (data) {
                        $(this.elem).attr('data-selected-value', data.value);
                    });
                });

                gDateInputItems.forEach(function (item) {
                    const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                    const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                    laydate.render({
                        elem: '#' + newId,
                        format: 'yyyyMMdd',
                        trigger: 'click',
                        position: 'bottom',
                        btns: ['clear', 'now', 'confirm'],
                        value: item.newDefaultValue || null,
                        change: function (value, date) {
                            // 当值改变时清除错误样式
                            const errorElement = document.getElementById(`error_${newId}`);
                            if (errorElement) {
                                errorElement.remove();
                            }
                            const inputElement = document.getElementById(newId);
                            if (inputElement) {
                                inputElement.style.borderColor = '';
                                inputElement.style.boxShadow = '';
                                inputElement.style.backgroundColor = '';
                            }
                        },
                        done: function (value, date) {
                            // 选择完成后清除错误样式
                            const errorElement = document.getElementById(`error_${newId}`);
                            if (errorElement) {
                                errorElement.remove();
                            }
                            const inputElement = document.getElementById(newId);
                            if (inputElement) {
                                inputElement.style.borderColor = '';
                                inputElement.style.boxShadow = '';
                                inputElement.style.backgroundColor = '';
                            }
                        }
                    });

                    laydate.render({
                        elem: '#' + originId,
                        format: 'yyyyMMdd',
                        trigger: 'click',
                        position: 'bottom',
                        btns: ['clear', 'now', 'confirm'],
                        value: item.originDefaultValue || null,
                        change: function (value, date) {
                            // 当值改变时清除错误样式
                            const errorElement = document.getElementById(`error_${originId}`);
                            if (errorElement) {
                                errorElement.remove();
                            }
                            const inputElement = document.getElementById(originId);
                            if (inputElement) {
                                inputElement.style.borderColor = '';
                                inputElement.style.boxShadow = '';
                                inputElement.style.backgroundColor = '';
                            }
                        },
                        done: function (value, date) {
                            // 选择完成后清除错误样式
                            const errorElement = document.getElementById(`error_${originId}`);
                            if (errorElement) {
                                errorElement.remove();
                            }
                            const inputElement = document.getElementById(originId);
                            if (inputElement) {
                                inputElement.style.borderColor = '';
                                inputElement.style.boxShadow = '';
                                inputElement.style.backgroundColor = '';
                            }
                        }
                    });
                });

                // 监听onesLink输入框的变化，自动填充其他字段
                const onesLinkInput = document.getElementById('onesLink');
                if (onesLinkInput) {
                    onesLinkInput.addEventListener('change', function () {
                        autoFillFromOnesLink();
                    });

                    onesLinkInput.addEventListener('blur', function () {
                        // 延迟执行，确保值已经更新
                        setTimeout(autoFillFromOnesLink, 100);
                    });
                }

                window.layuiLayer = layer;
            });


        };

    </script>
