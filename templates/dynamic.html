{% extends "base.html" %}

{% block title %}合同明细单价修改{% endblock %}

{% block main_content %}
    <div class="container-fluid p-0">
        <h4 class="mb-4" id="formName"></h4>

        <div class="card">
            <div class="card-body">
                <div class="row g-3 align-items-center">
                    <div class="input-group mb-3" style="width: 500px">
                        <span class="input-group-text">文件名</span>
                        <input type="text" id="filePrefix" class="form-control" placeholder="filePrefix">
                    </div>
                </div>
                <div class="row g-3 align-items-center">
                    <div class="input-group mb-3" style="width: 1200px">
                        <span class="input-group-text" required>onesLink</span>
                        <input type="text" id="onesLink" class="form-control" placeholder="onesLink">
                    </div>
                </div>
                <div class="row g-3 align-items-center">
                    <div class="input-group mb-3" style="width: 500px">
                        <span class="input-group-text">编号</span>
                        <input type="text" id="dynamicNo" class="form-control">
                    </div>
                </div>

                <h4>查询字段</h4>
                <hr class="layui-border-blue">
                <!-- 动态生成的文本类型输入框容器 -->
                <div id="queryContainer">
                    <!-- 所有文本类型的新值在一行，所有原值在一行 -->
                </div>


                <h4>修改字段</h4>
                <hr class="layui-border-blue">
                <!-- 动态生成的下拉框容器 -->
                <div id="selectContainer">
                    <!-- 每种下拉框单独一行 -->
                </div>

                <!-- 动态生成的单选框容器 -->
                <div id="radioContainer">
                    <!-- 每种单选框单独一行 -->
                </div>

                <!-- 动态生成的数值类型输入框容器 -->
                <div id="numberInputContainer">
                    <!-- 所有数值类型的新值在一行，所有原值在一行 -->
                </div>

                <!-- 动态生成的文本类型输入框容器 -->
                <div id="textInputContainer">
                    <!-- 所有文本类型的新值在一行，所有原值在一行 -->
                </div>

                <!-- 动态生成的日期类型输入框容器 -->
                <div id="dateInputContainer">
                    <!-- 所有日期类型的新值在一行，所有原值在一行 -->
                </div>

                <!-- 动态生成的补充框容器 -->
                <div id="supplementContainer">
                    <!-- 每个补充框单独一行，包含主输入框和子输入框 -->
                </div>


                <button onclick="submit()" class="layui-btn">提交</button>


            </div>
        </div>
    </div>

    <!-- 引入 Layui 样式 -->
    <link rel="stylesheet" href="/static/layui/css/layui.css">

    <!-- 引入 JS 库 -->
    <script src="/static/js/axios.min.js"></script>
    <script src="/static/layui/layui.js"></script>

    <script>
        // 存储所有 Layui 日期选择器实例
        const laydateInstances = [];

        // 全局配置对象
        let dynamicTableConfig = null;
        // 存储所有 Layui dropdown 实例
        const dropdownInstances = [];

        // 全局变量：配置项数组
        let gSelectItems = [];
        let gRadioItems = [];
        let gNumberInputItems = [];
        let gTextInputItems = [];
        let gDateInputItems = [];
        let gSupplementItems = [];


        // 存储当前激活的输入框信息
        let currentActiveInput = null;

        // 存储 Layui 表格弹出层实例
        let tableLayerIndex = null;

        /**
         * 获取所有输入框的值（全局方法）
         */
        window.getAllFormValues = function () {
            var result = {};
            var $ = layui.$;

            // 1. 获取查询字段的值（动态生成的）
            gQueryItems.forEach(function (item) {
                const queryId = item.bindingKey;
                const queryVal = $('#' + queryId).val() || '';

                result[item.bindingKey] = {
                    label: item.label,
                    value: queryVal,
                    inputType: 'query',
                    fieldType: item.type,
                    ValidRule: item.ValidRule,
                };
            });

            // 2. 获取公用字段的值（硬编码的三个输入框）
            // 文件名
            const filePrefixVal = $('#filePrefix').val() || '';
            result['filePrefix'] = {
                value: filePrefixVal,
                inputType: 'common',
                fieldType: 'text'
            };

            // OnesLink
            const onesLinkVal = $('#onesLink').val() || '';
            result['onesLink'] = {
                value: onesLinkVal,
                inputType: 'common',
                fieldType: 'text'
            };

            // 动态编号
            const dynamicNoVal = $('#dynamicNo').val() || '';
            result['dynamicNo'] = {
                value: dynamicNoVal,
                inputType: 'common',
                fieldType: 'text'
            };

            // 3. 获取下拉框的值
            gSelectItems.forEach(function (item) {
                const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                // 使用 jQuery 直接获取 select 的选中值
                const newVal = $('#' + newId).val() || '';
                const originVal = $('#' + originId).val() || '';

                {#console.log("newId", newId);#}
                {#console.log("newVal", newVal);#}
                {#console.log("originVal", originVal);#}

                result[item.bindingKey] = {
                    label: item.label,
                    newValue: newVal,
                    originValue: originVal,
                    inputType: 'select',
                    newValidRule: item.newValidRule,
                    originValidRule: item.originValidRule
                };
            });


            // 4. 获取单选框的值
            gRadioItems.forEach(function (item) {
                const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                // 获取选中的单选框值
                const checkedRadio = $('input[name="' + newId + '"]:checked');
                const newVal = checkedRadio.length > 0 ? checkedRadio.val() : '';
                const originVal = !newVal;

                result[item.bindingKey] = {
                    label: item.label,
                    newValue: newVal,
                    originValue: originVal,
                    inputType: 'radio',
                    ValidRule: item.newValidRule
                };
            });

            // 5. 获取普通输入框的值（包括数值、文本、日期）
            gNumberInputItems.concat(gTextInputItems).concat(gDateInputItems).forEach(function (item) {
                const newId = `new${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const originId = `origin${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                const newVal = $('#' + newId).val() || '';
                const originVal = $('#' + originId).val() || '';

                result[item.bindingKey] = {
                    label: item.label,
                    newValue: newVal,
                    originValue: originVal,
                    inputType: item.type,
                    fieldType: item.inputType,
                    newValidRule: item.newValidRule,
                    originValidRule: item.originValidRule
                };
            });


            // 6. 获取补充框的值
            gSupplementItems.forEach(function (item) {
                const mainNewId = `newMain${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                const mainOriginId = `originMain${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;

                const mainNewVal = $('#' + mainNewId).val() || '';
                const mainOriginVal = $('#' + mainOriginId).val() || '';

                // 存储主输入框的值
                result[item.bindingKey] = {
                    label: item.label,
                    newValue: mainNewVal,
                    originValue: mainOriginVal,
                    inputType: 'supplement',
                    fieldType: 'supplement'
                };

                // 存储每个子输入框的值（使用独立的 bindingKey）
                item.subFields.forEach((subField, index) => {
                    const subNewId = `newSub${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}_${index}`;
                    const subOriginId = `originSub${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}_${index}`;

                    const subNewVal = $('#' + subNewId).val() || '';
                    const subOriginVal = $('#' + subOriginId).val() || '';

                    result[subField.bindingKey] = {
                        newValue: subNewVal,
                        originValue: subOriginVal,
                        inputType: 'supplement-sub',
                        fieldType: 'supplement-sub',
                        parentKey: item.bindingKey
                    };
                });
            });

            return result;
        };

        /**
         * 获取查询字段的值（单独的方法）
         */
        window.getQueryFieldValues = function () {
            var result = {};
            var $ = layui.$;

            // 获取动态生成的查询字段
            gQueryItems.forEach(function (item) {
                const queryId = `query${item.bindingKey.charAt(0).toUpperCase() + item.bindingKey.slice(1)}`;
                result[item.bindingKey] = $('#' + queryId).val() || '';
            });

            // 获取硬编码的公用字段
            result['filePrefix'] = $('#filePrefix').val() || '';
            result['onesLink'] = $('#onesLink').val() || '';
            result['bpoLineId'] = $('#bpoLineId').val() || '';

            console.log('查询字段值:', result);
            return result;
        };
        /**
         * 处理补充框值变化的全局函数
         * @param {string} bindingKey - 绑定键
         * @param {HTMLElement} element - 触发事件的元素
         */
        window.supplementContainerChange = function (bindingKey, element) {
            const value = element.value;
            const fieldType = element.getAttribute('data-field-type');

            console.log('=== 补充框值变化 ===');
            console.log('bindingKey:', bindingKey);
            console.log('value:', value);
            console.log('fieldType:', fieldType);
            console.log('element.id:', element.id);
            console.log('是否为原值输入框:', element.id.startsWith('originMain'));

            // 记录当前激活的输入框
            currentActiveInput = {
                bindingKey: bindingKey,
                element: element,
                fieldType: fieldType
            };

            // 如果值为空，不显示弹出框
            if (!value || value.trim() === '') {
                console.log('值为空，不显示弹出框');
                return;
            }

            // 获取当前补充框的配置项
            const currentSupplementItem = gSupplementItems.find(item => item.bindingKey === bindingKey);

            if (!currentSupplementItem) {
                console.error('未找到对应的补充框配置:', bindingKey);
                return;
            }

            // 确定主字段名称（支持配置或默认）
            const mainField = currentSupplementItem.mainField || 'main_value';

            // 收集所有需要搜索的字段
            const searchFields = [mainField, ...currentSupplementItem.subFields.map(sf => sf.bindingKey)];

            // 模拟搜索数据（实际应该调用后端接口）
            const mockData = this.getMockDataForSupplement(currentSupplementItem);

            // 通用匹配逻辑：遍历所有搜索字段进行模糊匹配
            const filteredData = mockData.filter(item => {
                return searchFields.some(field => {
                    const fieldValue = item[field];
                    return fieldValue && String(fieldValue).toLowerCase().includes(value.toLowerCase());
                });
            });

            console.log('过滤后的数据:', filteredData);

            // 如果没有匹配的数据
            if (filteredData.length === 0) {
                const fieldLabel = currentSupplementItem.label || bindingKey;

                // 只有新值输入框才提示无效
                if (!element.id.startsWith('originMain')) {
                    console.error('无效的值，未找到匹配数据');
                    alert(`新${fieldLabel}："${value}"未找到匹配数据，请重新输入`);
                    element.value = '';
                } else {
                    console.log('原值未找到匹配数据，直接使用输入的值');
                }
                return;
            }

            // 如果只有一个匹配结果，并且是完全匹配，直接填充（仅新值）
            if (filteredData.length === 1 && !element.id.startsWith('originMain')) {
                const isExactMatch = String(filteredData[0][mainField]).toLowerCase() === value.toLowerCase();

                if (isExactMatch) {
                    console.log('完全匹配，直接填充');
                    fillInputWithData(filteredData[0], currentSupplementItem, element);

                    // 清除可能存在的错误提示
                    const errorElement = document.getElementById(`error_${element.id}`);
                    if (errorElement) {
                        errorElement.remove();
                    }

                    // 恢复输入框样式
                    element.style.borderColor = '';
                    element.style.boxShadow = '';
                    element.style.backgroundColor = '';
                    return;
                }
            }

            // 多个匹配结果或非完全匹配，显示表格选择框
            console.log('显示表格选择框');
            showTablePicker(bindingKey, value, fieldType, filteredData);
        };


        /**
         * 获取 Mock 数据（支持动态配置）
         * @param {Object} supplementItem - 补充框配置项
         * @returns {Array} Mock 数据数组
         */
        function getMockDataForSupplement(supplementItem) {
            // 这里返回通用的 Mock 数据，实际应该从后端接口获取
            // Mock 数据应该包含所有可能的字段，但前端会根据配置只取需要的字段

            // 方式 1：返回包含所有字段的完整数据（当前方案，简单但不推荐）
            // const allData = [ ... ];
            // return allData;

            // 方式 2：根据补充框类型返回对应的数据（推荐）
            const mockDataMap = {
                // 地址信息的 Mock 数据
                address: [
                    {
                        id: '1',
                        main_value: '北京市朝阳区',
                        address_district: '朝阳区',
                        address_street: '建国路'
                    },
                    {
                        id: '2',
                        main_value: '上海市浦东新区',
                        address_district: '浦东新区',
                        address_street: '世纪大道'
                    },
                    {
                        id: '3',
                        main_value: '广州市天河区',
                        address_district: '天河区',
                        address_street: '天河路'
                    },
                    {
                        id: '4',
                        main_value: '深圳市南山区',
                        address_district: '南山区',
                        address_street: '深南大道'
                    },
                    {
                        id: '5',
                        main_value: '杭州市西湖区',
                        address_district: '西湖区',
                        address_street: '文三路'
                    }
                ],

                // 联系方式的 Mock 数据
                contact: [
                    {
                        id: '1',
                        contact_main_value: '010-1234',
                        contact_area_code: '010',
                        contact_extension: '1234'
                    },
                    {
                        id: '2',
                        contact_main_value: '021-5678',
                        contact_area_code: '021',
                        contact_extension: '5678'
                    },
                    {
                        id: '3',
                        contact_main_value: '020-9012',
                        contact_area_code: '020',
                        contact_extension: '9012'
                    },
                    {
                        id: '4',
                        contact_main_value: '0755-3456',
                        contact_area_code: '0755',
                        contact_extension: '3456'
                    },
                    {
                        id: '5',
                        contact_main_value: '0571-7890',
                        contact_area_code: '0571',

                    }
                ]
            };

            // 根据 bindingKey 返回对应的 Mock 数据
            const bindingKey = supplementItem.bindingKey;
            if (mockDataMap[bindingKey]) {
                console.log(`返回 ${bindingKey} 的 Mock 数据:`, mockDataMap[bindingKey]);
                return mockDataMap[bindingKey];
            }

            // 如果没有找到对应的数据，返回空数组
            console.warn(`未找到 ${bindingKey} 的 Mock 数据，返回空数组`);
            return [];
        }


        /**
         * 显示表格选择器（类似日期选择器的效果）
         * @param {string} bindingKey - 当前编辑的字段绑定键
         * @param {string} currentValue - 当前值
         * @param {string} fieldType - 字段类型
         * @param {Array} data - 表格数据（可选，默认使用 mockData）
         */
        window.showTablePicker = function (bindingKey, currentValue, fieldType, data) {
            console.log('=== showTablePicker 被调用 ===');
            console.log('bindingKey:', bindingKey);
            console.log('currentActiveInput:', currentActiveInput);

            // 确保 Layui 已加载
            if (typeof layui === 'undefined') {
                console.error('Layui 未加载!');
                return;
            }

            var $ = layui.$;
            var table = layui.table;
            var layer = layui.layer;

            console.log('layui 组件状态:', {
                $: !!$,
                table: !!table,
                layer: !!layer
            });

            if (!table) {
                console.error('Layui table 模块未加载！请使用 layui.use(["table", "layer"], ...) 加载');
                alert('表格模块未加载，请检查控制台错误');
                return;
            }

            if (!layer) {
                console.error('Layui layer 模块未加载！');
                alert('弹出层模块未加载');
                return;
            }

            // 关闭之前的弹出层（如果有）
            if (tableLayerIndex !== null) {
                layer.close(tableLayerIndex);
            }

            // 根据当前编辑的字段动态生成表头
            var currentSupplementItem = gSupplementItems.find(item => item.bindingKey === bindingKey);

            console.log('currentSupplementItem:', currentSupplementItem);

            if (!currentSupplementItem) {
                console.error('未找到对应的补充框配置:', bindingKey);
                return;
            }

            // 确定主字段名称
            const mainField = currentSupplementItem.mainField || 'main_value';

            // 构建表头：主输入框 + 子输入框的 label
            var colsConfig = [
                {type: 'radio', width: 50, title: '选择', fixed: true}
            ];

            // 添加主输入框列 - 使用配置的主字段
            colsConfig.push({
                field: mainField,
                title: currentSupplementItem.label,
                minWidth: 150,
                sort: true
            });

            // 添加子输入框列 - 动态遍历子字段配置
            currentSupplementItem.subFields.forEach(subField => {
                colsConfig.push({
                    field: subField.bindingKey,
                    title: subField.label,
                    minWidth: subField.width || 120,
                    sort: true
                });
            });

            console.log('colsConfig:', colsConfig);

            // 准备示例数据（实际使用时可以从后端获取）
            var mockData = getMockDataForSupplement(currentSupplementItem);

            // 根据当前输入值过滤数据
            var filteredData = data || mockData;
            if (currentValue && !data) {
                const searchFields = [mainField, ...currentSupplementItem.subFields.map(sf => sf.bindingKey)];
                filteredData = mockData.filter(item => {
                    return searchFields.some(field => {
                        const fieldValue = item[field];
                        return fieldValue && String(fieldValue).toLowerCase().includes(currentValue.toLowerCase());
                    });
                });
            }

            console.log('表格显示的数据:', filteredData);

            // 使用全局变量 currentActiveInput 中的 element
            var element = currentActiveInput.element;

            if (!element) {
                console.error('element 为空!');
                return;
            }

            // 获取"提交"按钮的位置
            var submitButton = document.querySelector('button[onclick="submit()"]');
            var buttonRect = submitButton ? submitButton.getBoundingClientRect() : null;

            // 获取输入框相对于视口的位置
            var rect = element.getBoundingClientRect();

            console.log('输入框位置:', {
                top: rect.top,
                left: rect.left,
                bottom: rect.bottom,
                right: rect.right,
                width: rect.width,
                height: rect.height
            });

            if (buttonRect) {
                console.log('按钮位置:', {
                    top: buttonRect.top,
                    bottom: buttonRect.bottom
                });
            }

            // 估算表格高度（每行约 38px，最多显示 5 行）
            var estimatedTableHeight = 5 * 38 + 40;
            var popupHeight = estimatedTableHeight + 10;
            var popupWidth = 600;

            // 计算下方可用空间（考虑按钮位置）
            var windowHeight = window.innerHeight;
            var maxBottom = buttonRect ? buttonRect.top - 10 : windowHeight - 10;
            var spaceBelow = maxBottom - rect.bottom - 5;
            var spaceAbove = rect.top - 10;

            console.log('空间计算:', {
                windowHeight: windowHeight,
                maxBottom: maxBottom,
                spaceBelow: spaceBelow,
                spaceAbove: spaceAbove,
                popupHeight: popupHeight
            });

            // 决定弹出方向：优先向下，空间不足时向上
            var top = rect.bottom + 5;
            var left = rect.left;

            if (spaceBelow < popupHeight && spaceAbove >= popupHeight) {
                top = rect.top - popupHeight - 5;
                console.log('向下空间不足（会遮挡按钮），改为向上弹出');
            } else if (spaceBelow < popupHeight && spaceAbove < popupHeight) {
                console.log('上下空间都不足，保持向下弹出（表格将显示滚动条）');
            } else {
                console.log('向下弹出');
            }

            // 检查右侧空间
            var viewportWidth = window.innerWidth;
            var spaceRight = viewportWidth - rect.left;

            if (spaceRight < popupWidth) {
                left = viewportWidth - popupWidth - 10;
                console.log('向右空间不足，调整为靠左对齐');
            }

            console.log('弹出层位置:', {top: top, left: left});

            // 创建临时容器
            var tempId = 'tablePicker_' + new Date().getTime();
            var containerHtml = '<div id="' + tempId + '" style="padding: 5px;background: white;border: 1px solid #ddd;"></div>' +
                '<table class="layui-hide" id="ID-table-picker-' + bindingKey + '" lay-filter="tablePickerFilter"></table>';

            console.log('containerHtml:', containerHtml);

            // 使用 layer.open 创建弹出层
            tableLayerIndex = layer.open({
                type: 1,
                content: containerHtml,
                area: ['auto', 'auto'],
                offset: [top + 'px', left + 'px'],
                skin: 'layui-layer-content',
                shade: false,
                closeBtn: 0,
                move: false,
                resize: false,
                zIndex: 999999,
                scrollbar: false,
                background: '#FFFFFF',
                fixed: true,
                success: function (layero, index) {
                    console.log('弹出层打开成功，layero:', layero);

                    window.currentTableLayerIndex = index;

                    $(layero).css({
                        'background': '#FFFFFF',
                        'border': '1px solid #ddd',
                        'box-shadow': '0 2px 8px rgba(0,0,0,0.15)',
                        'z-index': '999999'
                    });

                    table.render({
                        elem: '#ID-table-picker-' + bindingKey,
                        cols: [colsConfig],
                        data: filteredData,
                        page: true,
                        limit: 5,
                        limits: [5, 10, 15],
                        autoSort: true,
                        skin: 'line',
                        even: true,
                        size: 'sm',
                        done: function (res, curr, count) {
                            console.log('表格渲染完成', res, curr, count);

                            setTimeout(function () {
                                $(layero).css('z-index', '999999');
                            }, 100);
                        }
                    });

                    table.on('radio(tablePickerFilter)', function (obj) {
                        var data = obj.data;

                        console.log('选中的行数据:', data);
                        console.log('当前输入框 ID:', element.id);
                        console.log('是否为原值输入框:', element.id.startsWith('originMain'));

                        // 填充数据
                        fillInputWithData(data, currentSupplementItem, element);

                        console.log('准备关闭弹出层，索引:', window.currentTableLayerIndex);
                        layer.close(window.currentTableLayerIndex);
                        tableLayerIndex = null;
                        window.currentTableLayerIndex = null;
                        console.log('弹出层已关闭');
                    });

        window.submit = function () {
            if (!layui.$) {
                console.error('Layui 尚未完全加载，请稍后再试');
                return null;
            }

            var hasError = false;

            // 获取所有表单值
            const allValues = window.getAllFormValues();
            console.log('=== 所有输入框的值 ===');

            // 遍历所有值进行校验
            for (const [key, item] of Object.entries(allValues)) {
                let element = null;
                let errorId = null;
                let errorLabel = null;

                // 文本、数值、日期、下拉框 做校验
                if (item.inputType === 'text' || item.inputType === 'number' || item.inputType === 'date' || item.inputType === 'select') {
                    // 新值校验
                    if ((item.newValue === '' || item.newValue === null || item.newValue === undefined) && item.newValidRule === 'required') {
                        const newId = `new${key.charAt(0).toUpperCase() + key.slice(1)}`;
                        element = document.getElementById(newId);
                        errorId = `error_${newId}`;
                        errorLabel = `新${item.label}不能为空`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }

                    // 原值校验
                    if ((item.originValue === '' || item.originValue === null || item.originValue === undefined) && item.originValidRule === 'required') {
                        const originId = `origin${key.charAt(0).toUpperCase() + key.slice(1)}`;
                        element = document.getElementById(originId);
                        errorId = `error_${originId}`;
                        errorLabel = `原${item.label} 不能为空`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }
                }

                // 查询字段和单选框做校验
                if (item.inputType === 'radio' || item.inputType === 'query') {
                    let newId;
                    let errorLabel;
                    let elementValue;
                    // 兼容 ValidRule 和 newValidRule 两种属性名
                    let validRule = item.ValidRule || item.newValidRule;

                    if (item.inputType === 'radio') {
                        // 单选框：ID 为 new 开头的字段，值在 newValue 中
                        newId = `new${key.charAt(0).toUpperCase() + key.slice(1)}`;
                        elementValue = item.newValue;
                        errorLabel = `新${item.label}不能为空`;
                    } else if (item.inputType === 'query') {
                        // 查询字段：直接使用字段名作为 ID，值在 value 中
                        newId = key;
                        elementValue = item.value;
                        errorLabel = `${item.label}不能为空`;
                    }

                    // 新值校验：检查空值和 required 规则
                    if ((elementValue === '' || elementValue === null || elementValue === undefined) && validRule === 'required') {
                        // 单选框特殊处理：通过 name 属性查找第一个 radio 元素
                        if (item.inputType === 'radio') {
                            element = document.querySelector(`input[name="${newId}"]`);
                        } else {
                            element = document.getElementById(newId);
                        }

                        const errorId = `error_${newId}`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }
                }

                // 公共字段校验（必填项）
                if (item.inputType === 'common') {
                    if ((item.value === '' || item.value === null || item.value === undefined)) {
                        element = document.getElementById(key);
                        errorId = `error_${key}`;
                        errorLabel = `${element ? element.previousElementSibling?.textContent || key : key}不能为空`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }
                }

                // 补充框主输入框校验（新值和原值都要校验）
                if (item.inputType === 'supplement' || item.inputType === 'supplement-main') {
                    // 获取补充框配置
                    const supplementItem = gSupplementItems.find(s => s.bindingKey === key);

                    // 新主输入框校验
                    if ((item.newValue === '' || item.newValue === null || item.newValue === undefined)) {
                        const mainNewId = `newMain${key.charAt(0).toUpperCase() + key.slice(1)}`;
                        element = document.getElementById(mainNewId);
                        errorId = `error_${mainNewId}`;
                        errorLabel = `新${item.label}不能为空`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }

                    // 新子输入框校验（遍历所有子字段）
                    if (supplementItem && supplementItem.subFields) {
                        supplementItem.subFields.forEach((subField, index) => {
                            const subNewId = `newSub${key.charAt(0).toUpperCase() + key.slice(1)}_${index}`;
                            const subElement = document.getElementById(subNewId);
                            const subValue = subElement ? subElement.value : '';

                            if ((subValue === '' || subValue === null || subValue === undefined)) {
                                const subErrorId = `error_${subNewId}`;
                                const subErrorLabel = `新${subField.label}不能为空`;

                                if (subElement) {
                                    markAsError(subElement, subErrorId, subErrorLabel);
                                    console.error(subErrorLabel);
                                    hasError = true;
                                }
                            }
                        });
                    }
                }

                // 补充框子输入框校验（独立的子字段校验）
                if (item.inputType === 'supplement-sub') {
                    if ((item.newValue === '' || item.newValue === null || item.newValue === undefined)) {
                        const subNewId = `newSub${item.parentKey.charAt(0).toUpperCase() + item.parentKey.slice(1)}_${key.split('_').pop()}`;
                        element = document.getElementById(subNewId);
                        errorId = `error_${subNewId}`;
                        errorLabel = `新${item.label} 不能为空`;

                        if (element) {
                            markAsError(element, errorId, errorLabel);
                            console.error(errorLabel);
                            hasError = true;
                        }
                    }
                }
            }
            // 补充一个校验：从 allValues 获取所有查询字段的值，查询字段至少要有一个字段不能为空
            const queryFields = Object.entries(allValues).filter(([key, item]) => item.inputType === 'query');
            const hasNonEmptyQueryField = queryFields.some(([key, item]) => item.value !== '' && item.value !== null && item.value !== undefined);

            if (queryFields.length > 0 && !hasNonEmptyQueryField) {
                layui.layer.msg('查询字段至少需要填写一个条件', {icon: 2});
                hasError = true;
            }


            if (hasError) {
                console.error('表单校验失败，请检查标红字段');
                return null;
            } else {
                console.log(allValues);

                // 构建请求数据：配置 + 表单值
                const requestData = {
                    config: dynamicTableConfig,
                    formValues: allValues,
                };

                console.log('提交的数据:', requestData);

                // 显示加载提示
                const loadingIndex = layui.layer.load(2);

                // 使用 axios 发送 POST 请求
                axios.post('/api/dynamic/submit/', requestData)
                    .then(function (response) {
                        layui.layer.close(loadingIndex);
                        console.log('提交成功:', response.data);

                        if (response.data.success) {
                            layui.layer.msg('提交成功！', {icon: 1});
                        } else {
                            layui.layer.msg('提交失败：' + (response.data.message || '未知错误'), {icon: 2});
                        }
                    })
                    .catch(function (error) {
                        layui.layer.close(loadingIndex);
                        console.error('提交失败:', error);

                        let errorMsg = '网络错误';
                        if (error.response) {
                            errorMsg = error.response.data?.message || `服务器错误：${error.response.status}`;
                        } else if (error.request) {
                            errorMsg = '无法连接到服务器';
                        } else {
                            errorMsg = error.message;
                        }

                        layui.layer.msg(errorMsg, {icon: 2});
                    });
            }

        };


        /**

        function addOrUpdateError(inputElement, errorId, errorMessage) {

                    if (layuiInputInline) {

                        if (layuiInputInline.nextSibling) {

        /**

         * @param {HTMLElement} element - 输入框元素
         * @param {string} errorId - 错误元素 ID
         * @param {string} errorMessage - 错误信息
         */
        function markAsError(element, errorId, errorMessage) {
            // 设置边框样式
            element.style.borderColor = '#ff4d4f';
            element.style.boxShadow = '0 0 0 2px rgba(255, 77, 79, 0.2)';
            element.style.backgroundColor = '#fff1f0';

            // 添加或更新错误描述
            addOrUpdateError(element, errorId, errorMessage);

            // 监听输入事件，输入时清除错误样式
            const eventType = element.type === 'radio' || element.type === 'checkbox' ? 'change' : 'input';

            // 移除之前的事件监听器（避免重复绑定）
            element.removeEventListener(eventType, element.clearErrorHandler);

            // 创建新的事件监听器
            element.clearErrorHandler = function () {
                clearError(element, errorId);
                element.removeEventListener(eventType, element.clearErrorHandler);
            };

            // 添加事件监听器
            element.addEventListener(eventType, element.clearErrorHandler);
        }

         * @param {HTMLElement} inputElement - 输入框元素（input、select 或 radio）
         * @param {string} errorId - 错误元素 ID
         * @param {string} errorMessage - 错误信息
         */
        function addOrUpdateError(inputElement, errorId, errorMessage) {
            console.log(errorId)
            // 检查是否已存在错误提示
            let errorElement = document.getElementById(errorId);

            if (!errorElement) {
                // 创建错误提示元素
                errorElement = document.createElement('div');
                errorElement.id = errorId;
                errorElement.className = 'form-control-feedback';

                // 设置样式：红色文字、小字号、顶部间距
                errorElement.style.cssText = `
                  display:flex;
                  align-items:center;
                  padding:.375rem .75rem;
                  font-size:1rem;
                  font-weight:400;
                  line-height:1.5;
                  color:red;
                `;

                // 判断是否为下拉框元素
                const isSelect = inputElement.tagName === 'SELECT';

                // 判断是否为单选框元素
                const isRadio = inputElement.type === 'radio';

                if (isSelect) {
                    // 下拉框的特殊处理：找到 layui 渲染的容器
                    const layuiInputInline = inputElement.closest('.layui-input-inline');

                    if (layuiInputInline) {
                        // 在 layui-input-inline 容器后插入错误提示
                        if (layuiInputInline.nextSibling) {
                            layuiInputInline.parentNode.insertBefore(errorElement, layuiInputInline.nextSibling);
                        } else {
                            layuiInputInline.parentNode.appendChild(errorElement);
                        }
                    } else {
                        // 如果没有找到 layui 容器，回退到普通处理
                        const parentGroup = inputElement.closest('.input-group') || inputElement.parentElement;
                        if (parentGroup) {
                            if (inputElement.nextSibling) {
                                parentGroup.insertBefore(errorElement, inputElement.nextSibling);
                            } else {
                                parentGroup.appendChild(errorElement);
                            }
                        }
                    }
                } else if (isRadio) {
                    // 单选框的特殊处理：找到最近的 .input-group 容器
                    const parentGroup = inputElement.closest('.input-group');

                    if (parentGroup) {
                        // 在 .input-group 之后插入错误提示（而不是在其内部）
                        if (parentGroup.nextSibling) {
                            parentGroup.parentNode.insertBefore(errorElement, parentGroup.nextSibling);
                        } else {
                            parentGroup.parentNode.appendChild(errorElement);
                        }
                    } else {
                        // 回退到普通处理
                        const wrapperDiv = inputElement.closest('div[class*="layui-form-radio"]') || inputElement.parentElement;
                        if (wrapperDiv) {
                            if (wrapperDiv.nextSibling) {
                                wrapperDiv.parentNode.insertBefore(errorElement, wrapperDiv.nextSibling);
                            } else {
                                wrapperDiv.parentNode.appendChild(errorElement);
                            }
                        }
                    }
                } else {
                    // 普通输入框的处理逻辑
                    const parentGroup = inputElement.closest('.input-group') || inputElement.parentElement;

                    if (parentGroup) {
                        // 在输入框之后插入错误提示
                        if (inputElement.nextSibling) {
                            parentGroup.insertBefore(errorElement, inputElement.nextSibling);
                        } else {
                            parentGroup.appendChild(errorElement);
                        }
                    } else {
                        // 如果没有找到父容器，直接在输入框后插入
                        if (inputElement.parentNode) {
                            if (inputElement.nextSibling) {
                                inputElement.parentNode.insertBefore(errorElement, inputElement.nextSibling);
                            } else {
                                inputElement.parentNode.appendChild(errorElement);
                            }
                        }
                    }
                }
            }

            // 更新错误信息
            errorElement.textContent = errorMessage;
        }

        /**
         * 清除输入框的错误提示和样式
         * @param {HTMLElement} inputElement - 输入框元素
         * @param {string} errorId - 错误元素 ID
         */
        function clearError(inputElement, errorId) {
            // 清除错误提示元素
            const errorElement = document.getElementById(errorId);
            if (errorElement) {
                errorElement.remove();
            }

            // 恢复输入框样式
            inputElement.style.borderColor = '';
            inputElement.style.boxShadow = '';
            inputElement.style.backgroundColor = '';
        }

        /**
         * 为输入框添加错误标记并监听输入事件
         * @param {HTMLElement} element - 输入框元素
         * @param {string} errorId - 错误元素 ID
         * @param {string} errorMessage - 错误信息
         */
        function markAsError(element, errorId, errorMessage) {
            // 设置边框样式
            element.style.borderColor = '#ff4d4f';
            element.style.boxShadow = '0 0 0 2px rgba(255, 77, 79, 0.2)';
            element.style.backgroundColor = '#fff1f0';

            // 添加或更新错误描述
            addOrUpdateError(element, errorId, errorMessage);

            // 监听输入事件，输入时清除错误样式
            const eventType = element.type === 'radio' || element.type === 'checkbox' ? 'change' : 'input';

            // 移除之前的事件监听器（避免重复绑定）
            element.removeEventListener(eventType, element.clearErrorHandler);

            // 创建新的事件监听器
            element.clearErrorHandler = function () {
                clearError(element, errorId);
                element.removeEventListener(eventType, element.clearErrorHandler);
            };

            // 添加事件监听器
            element.addEventListener(eventType, element.clearErrorHandler);
        }

                        value: item.originDefaultValue || null
                    });
                });

                // 将 layer 保存到全局变量以便后续使用
                window.layuiLayer = layer;
            });


        };
    </script>


{% endblock %}
