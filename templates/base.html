<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Work Tools{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="/static/bootstrap-icons-1.13.1/bootstrap-icons.css">
    <style>
        /* 侧边栏样式 */
        .sidebar {
            min-height: 100vh;
            background-color: #2c3e50;
            color: white;
        }
        
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 12px 20px;
            border-radius: 4px;
            margin: 2px 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        
        .sidebar .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .sidebar .nav-link.active {
            background-color: #3498db;
            color: white;
        }
        
        .sidebar .nav-link i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }
        
        .sidebar .nav-link .arrow {
            margin-left: auto;
            transition: transform 0.2s;
        }
        
        .sidebar .nav-link[aria-expanded="true"] .arrow {
            transform: rotate(90deg);
        }
        
        /* 二级菜单样式 */
        .submenu {
            list-style: none;
            padding-left: 0;
            margin: 0;
            display: none;
        }
        
        .submenu.show {
            display: block;
        }
        
        .submenu .nav-link {
            padding: 10px 20px 10px 50px;
            font-size: 14px;
            position: relative;
        }
        
        .submenu .nav-link::before {
            content: "├";
            position: absolute;
            left: 35px;
            color: rgba(255, 255, 255, 0.3);
        }
        
        .submenu .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        
        .submenu .nav-link.active {
            background-color: #3498db;
            color: white;
        }
        
        /* 搜索框样式 */
        .search-box {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }
        
        .search-box input {
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            width: 100%;
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .search-box input:focus {
            background-color: rgba(255, 255, 255, 0.2);
            outline: none;
            box-shadow: none;
        }
        
        /* 主体内容区 */
        .main-content {
            background-color: #f8f9fa;
            min-height: 100vh;
            padding: 20px;
        }
        
        /* 搜索结果列表 */
        .search-results {
            display: none;
            max-height: 300px;
            overflow-y: auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: absolute;
            width: calc(100% - 30px);
            z-index: 1000;
            margin-top: 5px;
            left: 15px;
        }
        
        .search-results.show {
            display: block;
        }
        
        .search-results .nav-link {
            color: #333;
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            margin: 0;
            border-radius: 0;
            display: flex;
            align-items: center;
        }
        
        .search-results .nav-link:hover {
            background-color: #f8f9fa;
        }
        
        .search-results .nav-link i {
            margin-right: 10px;
            color: #6c757d;
        }
        
        .no-results {
            padding: 15px;
            text-align: center;
            color: #999;
        }
        
        /* 菜单分组标题 */
        .menu-group-title {
            padding: 15px 20px 5px;
            font-size: 11px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse show">
                <div class="position-sticky pt-3">
                    <!-- 搜索框 -->
                    <div class="search-box">
                        <input type="text" 
                               id="sidebarSearch" 
                               class="form-control" 
                               placeholder="搜索页面..." 
                               autocomplete="off">
                        <div class="search-results" id="searchResults"></div>
                    </div>
                    
                    <!-- 主导航 -->
                    <ul class="nav flex-column" id="mainNav">
                        <li class="menu-group-title">主菜单</li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'home' %}active{% endif %}" 
                               href="/">
                                <i class="bi bi-house"></i>
                                首页
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'runoob' %}active{% endif %}" 
                               href="/runoob/">
                                <i class="bi bi-book"></i>
                                菜鸟教程
                            </a>
                        </li>
                        
                        <!-- 二级菜单示例：订单管理 -->
                        <li class="nav-item">
                            <a class="nav-link" href="#" data-bs-toggle="collapse" 
                               data-bs-target="#ordersSubmenu" aria-expanded="false">
                                <i class="bi bi-cart"></i>
                                订单管理
                                <i class="bi bi-chevron-right arrow"></i>
                            </a>
                            <ul class="submenu collapse" id="ordersSubmenu">
                                <li>
                                    <a class="nav-link {% if active_page == 'orders_list' %}active{% endif %}" 
                                       href="/orders/">
                                        订单列表
                                    </a>
                                </li>
                            </ul>
                        </li>

                        <li class="menu-group-title">系统设置</li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'settings' %}active{% endif %}" 
                               href="/settings/">
                                <i class="bi bi-gear"></i>
                                系统设置
                            </a>
                        </li>

                    </ul>
                </div>
            </nav>
            
            <!-- 主体内容 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                {% block main_content %}
                {% endblock %}
            </main>
        </div>
    </div>
    
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script>
        // 页面菜单数据 - 包含拼音和二级菜单
        const menuItems = [
            { name: '首页', pinyin: 'shouye sy', url: '/', icon: 'bi-house' },
            { name: '菜鸟教程', pinyin: 'cainiaojiaocheng cnjc', url: '/runoob/', icon: 'bi-book' },
            // 订单管理子菜单
            { name: '订单列表', pinyin: 'dingdanliebiao ddglb', url: '/orders/', parent: '订单管理' },
            // 一级菜单
            { name: '系统设置', pinyin: 'xitongshezhi xtsz', url: '/settings/', icon: 'bi-gear' },
            { name: '个人中心', pinyin: 'gerenzhongxin grzx', url: '/profile/', icon: 'bi-person' }
        ];
        
        const searchInput = document.getElementById('sidebarSearch');
        const searchResults = document.getElementById('searchResults');
        
        // 模糊搜索函数 - 支持中文、拼音、二级菜单
        function fuzzySearch(query) {
            if (!query.trim()) return [];
            
            query = query.toLowerCase().trim();
            
            return menuItems.filter(item => {
                const searchText = (item.name + ' ' + (item.pinyin || '') + (item.parent ? ' ' + item.parent : '')).toLowerCase();
                
                // 精确匹配（开头）
                if (item.name.toLowerCase().startsWith(query) || 
                    (item.pinyin && item.pinyin.startsWith(query))) {
                    return true;
                }
                
                // 模糊匹配（包含）
                return searchText.includes(query);
            });
        }
        
        // 渲染搜索结果
        function renderSearchResults(results) {
            if (results.length === 0) {
                searchResults.innerHTML = '<div class="no-results">未找到匹配的页面</div>';
                searchResults.classList.add('show');
                return;
            }
            
            const html = results.map(item => {
                const parentText = item.parent ? `<small class="text-muted ms-2">${item.parent}</small>` : '';
                const icon = item.icon || 'bi bi-circle';
                return `
                    <a class="nav-link" href="${item.url}">
                        <i class="${icon}"></i>
                        ${item.name}
                        ${parentText}
                    </a>
                `;
            }).join('');
            
            searchResults.innerHTML = html;
            searchResults.classList.add('show');
        }
        
        // 搜索输入事件
        searchInput.addEventListener('input', function(e) {
            const query = e.target.value;
            const results = fuzzySearch(query);
            renderSearchResults(results);
        });
        
        // 点击外部关闭搜索结果
        document.addEventListener('click', function(e) {
            if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
                searchResults.classList.remove('show');
            }
        });
        
        // 聚焦时显示搜索框
        searchInput.addEventListener('focus', function() {
            if (searchInput.value.trim()) {
                const results = fuzzySearch(searchInput.value);
                renderSearchResults(results);
            }
        });
        
        // 二级菜单自动展开 - 根据当前激活的页面
        document.addEventListener('DOMContentLoaded', function() {
            const activeLink = document.querySelector('.submenu .nav-link.active');
            if (activeLink) {
                const submenu = activeLink.closest('.submenu');
                if (submenu) {
                    submenu.classList.add('show');
                    const toggle = document.querySelector(`[data-bs-target="#${submenu.id}"]`);
                    if (toggle) {
                        toggle.setAttribute('aria-expanded', 'true');
                    }
                }
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
